function doPEProgress(nextPhase){
  var prev=nextPhase-1;var errs={};
  var checks={
    1:[{id:'ej_cm',ans:27},{id:'ej_pe1',ans:371}],
    2:[{id:'ej_num2',ans:12000},{id:'ej_pe2',ans:445}],
    3:[{id:'ej_num3',ans:8400},{id:'ej_pe3',ans:312}],
    4:[{id:'ej_num4',ans:14400},{id:'ej_pe4',ans:534}],
    5:[{id:'ej5_mc0',ans:27},{id:'ej5_mc1',ans:15},{id:'ej5_mc2',ans:30},
       {id:'ej5_mcp0',ans:16.2},{id:'ej5_mcp1',ans:4.5},{id:'ej5_mcp2',ans:3.0},
       {id:'ej5_mcpt',ans:23.7},{id:'ej5_pe',ans:608}],
  };
  var thisChecks=checks[prev]||[];
  var wrong=0;
  thisChecks.forEach(function(c){
    var v=parseFloat(A.inp[c.id]||'');
    if(isNaN(v)||!close(v,c.ans,.04)){errs[c.id]=true;wrong++;}
  });
  if(wrong>0){
    errs['_p'+prev]=true;
    ss({peErr:errs});
    msg('Hay '+(wrong===1?'1 valor incorrecto':wrong+' valores incorrectos')+'. Revísalos o usa el botón de ayuda.','warn');
  } else {
    ss({pePhase:nextPhase,peErr:{}});
  }}




function rCoeval(team,co){
  var myUid=A.user.id;
  var others=DB.getTeams().filter(function(t){return t.companyId&&t.id!==team.id;});
  var myEvs=DB.getEvals().filter(function(e){return e.evalId===myUid;});
  var tgt=A.evalTarget||(others[0]&&others[0].id)||null;
  var evalStage=parseInt(A.evalStage||1);
  var etm=tgt?DB.getTeams().find(function(t){return t.id===tgt;}):null;
  var eco=etm?getC(etm.companyId):null;
  var etmSub=etm?getTeamSub(etm.id,evalStage):null;
  var rubric=RUBRICS[evalStage];
  var alreadyEval=myEvs.some(function(e){return e.teamId===tgt&&e.stage===evalStage;});

  // Count pending evals
  var pendingCount=others.filter(function(t){
    return[1,2,3,4,5].some(function(s){
      var hasSub=!!getTeamSub(t.id,s);
      var hasEval=myEvs.some(function(e){return e.teamId===t.id&&e.stage===s;});
      return hasSub&&!hasEval;
    });
  }).length;

  return'<div class="fadein" style="max-width:1000px;margin:0 auto;padding:1rem">'+
    '<div class="fbet mb12">'+
      '<div>'+
        '<h2 class="f18 mb2">⭐ Coevaluación</h2>'+
        '<p class="t2 f12">Es <strong>obligatorio</strong> evaluar a todos los equipos para poder avanzar de etapa.</p>'+
      '</div>'+
      (pendingCount>0?'<span class="badge bwarn f11">'+pendingCount+' equipo(s) pendiente(s)</span>':'<span class="badge bok f11">✅ Al día</span>')+
    '</div>'+
    '<div class="g2">'+
    // LEFT: team list
    '<div style="max-width:260px">'+
      '<div class="lbl mb8">Equipos a evaluar</div>'+
      (others.length?others.map(function(t){
        var tc=getC(t.companyId);
        var teamEvs=myEvs.filter(function(e){return e.teamId===t.id;});
        var evaledStages=teamEvs.map(function(e){return e.stage;});
        var teamSubs=[1,2,3,4,5].filter(function(s){return!!getTeamSub(t.id,s);});
        var pending=teamSubs.filter(function(s){return!evaledStages.includes(s);});
        var isSelected=t.id===tgt;
        return'<div class="card mb8" style="cursor:pointer;border-color:'+(isSelected?'var(--p)':'var(--border)')+';background:'+(isSelected?'rgba(108,99,255,.08)':'var(--s1)')+'" data-et="'+t.id+'">'+
          '<div class="flex g8 mb6">'+
            '<span style="font-size:18px">'+(tc?tc.e:'?')+'</span>'+
            '<div><div class="fw6 f12">'+t.name+'</div><div class="t2 f11">'+(tc?tc.n:'?')+'</div></div>'+
          '</div>'+
          '<div class="flex g4">'+
            teamSubs.map(function(s){
              var evd=evaledStages.includes(s);
              return'<span class="badge '+(evd?'bok':'bwarn')+' f10">E'+s+(evd?' ✓':' ⏳')+'</span>';
            }).join('')+
          '</div>'+
        '</div>';
      }).join(''):'<p class="t2 f12">Sin otros equipos con entregas.</p>')+
    '</div>'+
    // RIGHT: eval form
    '<div>'+
    (etm&&eco?
      '<div class="card mb10">'+
        '<div class="flex g10 mb10">'+
          '<span style="font-size:24px">'+eco.e+'</span>'+
          '<div>'+
            '<div class="fw7 f14">'+etm.name+' — '+eco.n+'</div>'+
            '<div class="t2 f11">Selecciona la etapa y evalúa su trabajo</div>'+
          '</div>'+
          '<button class="btn btn-sm btn-ok" onclick="generateReport('+evalStage+',DB.getTeams().find(function(t){return t.id===\''+tgt+'\';}),getC(\''+eco.id+'\'))">📄 PDF del equipo</button>'+
        '</div>'+
        // Stage tabs
        '<div class="flex g6 mb12">'+
        [1,2,3,4,5].map(function(s){
          var hasSub=!!getTeamSub(etm.id,s);
          var hasEval=myEvs.some(function(e){return e.teamId===tgt&&e.stage===s;});
          return'<button onclick="A.evalStage='+s+';render()" '+
            'style="padding:5px 12px;border-radius:6px;border:1px solid '+(s===evalStage?'var(--p)':'var(--border)')+';'+
            'background:'+(s===evalStage?'var(--p)':'var(--s1)')+';color:'+(s===evalStage?'#fff':'var(--t2)')+';'+
            'font-size:11px;cursor:pointer;opacity:'+(hasSub?1:.35)+'" '+(hasSub?'':'disabled')+'>'+
            'E'+s+(hasEval?' ✓':'')+'</button>';
        }).join('')+
        '</div>'+

                  'style="flex:1;padding:8px 4px;border-radius:6px;border:2px solid '+(sel?'var(--p)':'var(--border)')+';'+
                  'background:'+(sel?'var(--p)':'var(--s1)')+';color:'+(sel?'#fff':'var(--t2)')+';'+
                  'font-size:12px;cursor:pointer;text-align:center">'+
                  '<div class="fw7">'+v+'</div>'+
                  '<div style="font-size:10px">'+labels[v]+'</div>'+
                '</button>';
              }).join('')+
              '</div>'+
              (cur?'<div style="font-size:11px;color:var(--yellow);font-style:italic">'+c.lvl[cur]+'</div>':'')+

function doEval(){
  var myTeam0=getUserTeam(A.user.id);
  if(myTeam0&&myTeam0.leaderId!==A.user.id&&A.user.role!=='admin'){
    msg('Solo el capitán puede enviar coevaluaciones.','warn');return;
  }
  var tid=A.evalTarget; var stage=parseInt(A.evalStage||1);
  if(!tid){msg('Selecciona un equipo.','warn');return;}
  var rubric=RUBRICS[stage];
  if(!rubric){msg('Etapa inválida.','warn');return;}
  // Collect rubric scores with team-specific keys
  var rubricScores={};
  var allScored=true;
  rubric.criteria.forEach(function(c){
    var v=parseInt(A.inp['ev_'+tid+'_'+stage+'_'+c.id]||0);
    if(!v){allScored=false;}
    rubricScores[c.id]=v;
  });
  if(!allScored){msg('Califica todos los criterios de la rúbrica antes de enviar.','warn');return;}
  var comment=(document.getElementById('ev_comment_'+tid+'_'+stage)?.value||A.inp['ev_comment_'+tid+'_'+stage]||'').trim();
  if(comment.length<20){msg('Escribe un comentario de al menos 20 caracteres.','warn');return;}
  var evs=DB.getEvals();
  // One eval per evaluator per team per stage
  var idx=evs.findIndex(function(e){return e.evalId===A.user.id&&e.teamId===tid&&e.stage===stage;});
  var ev={id:idx>=0?evs[idx].id:uid(),evalId:A.user.id,evalName:A.user.name,
          teamId:tid,stage:stage,rubricScores:rubricScores,
          fieldEvals:{},scores:{},comment:comment,createdAt:Date.now()};
  if(idx>=0)evs[idx]=ev;else evs.push(ev);
  DB.saveEvals(evs);
  try{SYNC.pushEval(ev);}catch(se){console.warn('[SYNC]',se);}
  rubric.criteria.forEach(function(c){delete A.inp['ev_'+tid+'_'+stage+'_'+c.id];});
  delete A.inp['ev_comment_'+tid+'_'+stage];
  var tname=(DB.getTeams().find(function(t){return t.id===tid;})||{name:'equipo'}).name;
  msg('✅ Coevaluación E'+stage+' de '+tname+' guardada en la base de datos.','ok');
  ss({});}

// Check if user has co-evaluated all teams for a given stage
function hasEvaluatedAll(stage){
  var myUid=A.user.id;
  var myTeam=getUserTeam(myUid);
  var others=DB.getTeams().filter(function(t){
    return t.companyId&&t.id!==(myTeam&&myTeam.id)&&getTeamSub(t.id,stage);
  });
  if(!others.length)return true; // no one to eval
  var myEvs=DB.getEvals().filter(function(e){return e.evalId===myUid&&e.stage===stage;});
  return others.every(function(t){return myEvs.some(function(e){return e.teamId===t.id;});});}

// SUPABASE SYNC LAYER
// — Works alongside localStorage. Configure in Panel Docente.
// — All reads come from localStorage (fast/offline).
// — Writes go to both localStorage AND Supabase (when enabled).
// ================================================================
const SYNC={
  sb:null,
  get enabled(){return!!this.sb;},
  init(url,key){
    if(!url||!key||url.includes('YOUR_')||!window.supabase){this.sb=null;return false;}
    try{this.sb=window.supabase.createClient(url,key);return true;}
    catch(e){this.sb=null;return false;}
  },
  // Pull ALL data from Supabase → localStorage → re-render
  async pull(){
    if(!this.sb)return;
    try{
      var [u,t,s,ev]=await Promise.all([
        this.sb.from('fa_users').select('*'),
        this.sb.from('fa_teams').select('*'),
        this.sb.from('fa_subs').select('*'),
        this.sb.from('fa_evals').select('*'),
      ]);
      if(u.data)localStorage.setItem('fa2_users',JSON.stringify(u.data));
      if(t.data){var teams=t.data.map(function(r){var row=Object.assign({},r);if('description' in row){row.desc=row.description;delete row.description;}return row;});localStorage.setItem('fa2_teams',JSON.stringify(teams));}
      if(s.data){
        var subs={};
        s.data.forEach(function(r){
          if(!subs[r.team_id])subs[r.team_id]={};
          subs[r.team_id][r.stage]={data:r.data,score:r.score,submittedBy:r.submitted_by,submittedAt:r.submitted_at};
        });
        localStorage.setItem('fa2_subs',JSON.stringify(subs));
      }
      if(ev.data)localStorage.setItem('fa2_evals',JSON.stringify(ev.data));
      console.log('[SYNC] Datos actualizados desde Supabase');
    }catch(e){console.warn('[SYNC] Error al sincronizar:',e.message);}
  },
  // Subscribe to real-time changes
  subscribe(){
    if(!this.sb)return;
    var self=this;var pullTimer=null;
    this.sb.channel('fa_realtime')
      .on('postgres_changes',{event:'*',schema:'public'},function(){
        // Debounce: only pull once per 3 seconds
        clearTimeout(pullTimer);
        pullTimer=setTimeout(function(){
          self.pull().then(function(){render();});
        },3000);
      })
      .subscribe();
    console.log('[SYNC] Suscripción en tiempo real activa');
  },
  async pushUser(u){if(!this.sb)return;
    await this.sb.from('fa_users').upsert({
      id:u.id,name:u.name,email:u.email||u.id,password:u.password||'',

    },{onConflict:'id'});},
  async pushSub(teamId,stage,sub){
    if(!this.sb)return;

      id:teamId+'_'+stage,team_id:teamId,stage:stage,

    },{onConflict:'id'});
  },

    await this.sb.from('fa_evals').upsert({
      id:ev.id,eval_id:ev.evalId,eval_name:ev.evalName||'',

      comment:ev.comment||'',created_at:ev.createdAt||Date.now()
    },{onConflict:'id'});},
  async deleteTeam(tid){if(!this.sb)return;await this.sb.from('fa_teams').delete().eq('id',tid);await this.sb.from('fa_subs').delete().eq('team_id',tid);await this.sb.from('fa_evals').delete().eq('team_id',tid);},
  async deleteUser(uid_){if(!this.sb)return;await this.sb.from('fa_users').delete().eq('id',uid_);},
  async deleteTeamSubs(tid){if(!this.sb)return;await this.sb.from('fa_subs').delete().eq('team_id',tid);},
  async pushAllUsers(users){if(!this.sb)return;for(var u of users){await this.pushUser(u);}},

function calcTeamScore(tid){const t=DB.getTeams().find(t=>t.id===tid);if(!t||!t.companyId)return 0;let tot=0,earn=0;for(let s=1;s<=5;s++){const sub=getTeamSub(tid,s);if(!sub)continue;tot+=100;earn+=(sub.score||0);}return tot?Math.round(earn/tot*100):0;}
function calcEvalAcc(team){const evs=DB.getEvals().filter(e=>team.members&&team.members.includes(e.evalId));if(!evs.length)return 50;let acc=0;evs.forEach(ev=>{const ts=calcTeamScore(ev.teamId);const es=((ev.scores.rigor+ev.scores.comp+ev.scores.interp+ev.scores.pres)/20)*100;acc+=Math.max(0,100-Math.abs(es-ts));});return Math.round(acc/evs.length);}

function doLogin(){
  if(A.loginMode==='demo'||(A.inp.lEmail||'').toLowerCase()==='demo'){
    var du={id:'demo',name:'Demo Admin',email:'demo@ebc.mx',role:'admin'};
    DB.saveSession(du);ss({user:du,screen:'demo'});return;
  }
  var email=(A.inp.lEmail||document.getElementById('lEmail')?.value||'').trim().toLowerCase();
  var code=(A.inp.lCode||document.getElementById('lCode')?.value||'').trim().replace(/[^0-9]/g,'');
  if(!email){msg('Ingresa tu correo institucional.','warn');return;}
  if(!email.includes('@')){msg('Correo inválido. Ej: nombre@ebc.edu.mx','warn');return;}
  if(!code||code.length<6){msg('Ingresa tu clave de estudiante (solo los números después de la M).','warn');return;}
  var studentCode='M'+code;
  var users=DB.getUsers();
  // Find by email OR by student code
  var u=users.find(function(x){return x.email===email||x.studentCode===studentCode;});
  if(!u){
    // New student
    u={id:uid(),name:email.split('@')[0].replace(/\./g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}),
       email:email,studentCode:studentCode,role:'student',
       memberNames:[],createdAt:Date.now()};
    users.push(u);DB.saveUsers(users);SYNC.pushUser(u);
  } else {
    // Update code if changed
    if(!u.studentCode){u.studentCode=studentCode;DB.saveUsers(users);SYNC.pushUser(u);}
  }
  DB.saveSession(u);
  var t=getUserTeam(u.id);
  ss({user:u,screen:t&&t.companyId?'student':'lobby',inp:{}});}

    requests:[],companyId:null,maxMembers:mnames.length||1,status:'open',

function doCreateTeam(){
  const name=(A.inp.ct_name||document.getElementById('ct_name')?.value||'').trim();
  const desc=(A.inp.ct_desc||document.getElementById('ct_desc')?.value||'').trim();
  const max=parseInt(A.inp.ct_max||document.getElementById('ct_max')?.value||'4');
  if(!name){msg('El nombre del equipo es obligatorio.','warn');return;}
  const teams=DB.getTeams();
  if(teams.find(t=>t.name.toLowerCase()===name.toLowerCase())){msg('Ya existe un equipo con ese nombre.','err');return;}
  if(getUserTeam(A.user.id)){msg('Ya perteneces a un equipo.','warn');return;}
  const t={id:uid(),name,desc,leaderId:A.user.id,members:[A.user.id],memberNames:[A.user.name||''],requests:[],companyId:null,maxMembers:max,status:'open',createdAt:Date.now()};

function doSelectCo(teamId,coId){
  const teams=DB.getTeams();const taken=teams.some(t=>t.companyId===coId&&t.id!==teamId);
  if(taken){msg('Esa empresa ya fue elegida por otro equipo.','err');return;}
  const t=teams.find(t=>t.id===teamId);if(!t)return;
  t.companyId=coId;t.status='active';DB.saveTeams(teams);SYNC.pushTeam(t);ss({screen:'student',view:'home',stage:1});}


function doJoinRequest(teamId){
  var teams=DB.getTeams();
  var t=teams.find(function(t){return t.id===teamId;});
  if(!t){msg('Equipo no encontrado.','err');return;}
  var max=t.maxMembers||4;
  if((t.members||[]).length>=max){msg('El equipo está lleno.','err');return;}
  if((t.members||[]).includes(A.user.id)){msg('Ya eres parte de este equipo.','warn');return;}
  // Direct join — no approval needed
  t.members=(t.members||[]).concat([A.user.id]);
  if(!(t.memberNames||[]).includes(A.user.name))
    t.memberNames=(t.memberNames||[]).concat([A.user.name]);
  if(t.members.length>=max)t.status='full';
  DB.saveTeams(teams);SYNC.pushTeam(t);
  msg('✅ Te uniste al equipo '+t.name,'ok');
  ss({screen:'lobby'});}

function doApproveReq(teamId,userId){
  const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;
  if(t.members.length>=t.maxMembers){msg('El equipo está lleno.','err');return;}
  const req=t.requests.find(r=>r.userId===userId);if(req)req.status='accepted';
  if(!t.members.includes(userId))t.members.push(userId);
  if(t.members.length>=t.maxMembers)t.status='full';
  DB.saveTeams(teams);ss({tsv:'requests'});msg('✓ Miembro aprobado.','ok');}


function doRejectReq(teamId,userId){const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;const req=t.requests.find(r=>r.userId===userId);if(req)req.status='rejected';DB.saveTeams(teams);ss({tsv:'requests'});msg('Solicitud rechazada.','warn');}


function doKick(teamId,userId){
  if(!confirm('¿Expulsar a este miembro?'))return;
  const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;
  t.members=t.members.filter(id=>id!==userId);t.status='open';DB.saveTeams(teams);ss({tsv:'members'});}


function doLeaveTeam(teamId){
  if(!confirm('¿Salir del equipo?'))return;
  var teams=DB.getTeams();
  var t=teamId?teams.find(function(x){return x.id===teamId;}):teams.find(function(x){return(x.members||[]).includes(A.user.id);});
  if(!t)return;
  if(t.leaderId===A.user.id){teams.splice(teams.findIndex(x=>x.id===teamId),1);msg('Equipo disuelto.','warn');}
  else{t.members=t.members.filter(function(id){return id!==A.user.id;});t.status='open';SYNC.pushTeam(t);}
  DB.saveTeams(teams);ss({screen:'lobby'});}

function doSaveTeacherEval(){
  var teamId=A.inp.te_team;var stage=parseInt(A.inp.te_stage||1);
  if(!teamId){msg('Selecciona un equipo.','warn');return;}
  var grade=parseInt(A.inp.te_grade||0);
  if(isNaN(grade)||grade<0||grade>100){msg('Calificacion debe ser 0-100.','warn');return;}
  var scores={};var rubric=TEACHER_RUBRIC[stage];
  if(rubric)rubric.criteria.forEach(function(c){var v=parseInt(A.inp['tg_'+c.id]||0);if(v>0)scores[c.id]=v;});
  var tEvs=DB.getTeacherEvals();
  var idx=tEvs.findIndex(function(e){return e.teamId===teamId&&e.stage===stage;});
  var ev={id:uid(),teamId:teamId,stage:stage,scores:scores,grade:grade,
          feedback:document.getElementById('te_feedback')?.value||A.inp.te_feedback||'',createdAt:Date.now()};
  if(idx>=0)tEvs[idx]=ev;else tEvs.push(ev);
  DB.saveTeacherEvals(tEvs);SYNC.pushTeacherEval(ev);
  msg('Evaluacion docente guardada.','ok');ss({teacherTab:'evaluar'});}

async function doAIEvaluate(teamId,stage){
  var team=DB.getTeams().find(function(t){return t.id===teamId;});
  if(!team){msg('Equipo no encontrado.','warn');return;}
  var sub=getTeamSub(teamId,stage);
  var co=getC(team.companyId);
  if(!sub){msg('Sin entrega en esta etapa.','warn');return;}
  A.aiEvalLoading=true;A.aiEvalTeam=teamId;A.aiEvalStage=stage;A.aiEvalResult=null;render();
  var d=sub.data||{};
  var snames=['','Empresa y Canvas','Estados Financieros','Razones de Liquidez','Analisis H y V y EFE','Punto de Equilibrio Ponderado'];
  var fieldLabels={s1a:'Por que eligieron la empresa',s1b:'Entorno externo',s1c:'Coherencia del modelo',
    s1bmc_propuesta:'Canvas PV',s1bmc_segmentos:'Canvas Segmentos',s1bmc_ingresos:'Canvas Ingresos',s1bmc_costos:'Canvas Costos',
    s2g1:'Estructura activos',s2g2:'Costos y PV',s2g3:'Financiamiento',s2g4:'Margen esperado',
    s3i:'Interpretacion liquidez',s3opi:'Ciclos operativos',s3g1:'Liquidez sectorial',
    s4i:'Diagnostico H+V+EFE',s4efe:'Flujo efectivo',s4g1:'Factores crecimiento',
    s5i:'Interpretacion PE',s5g1:'Por que PE ponderado',s5g2:'Portafolio',s5g3:'Palancas PE'};
  var responses='';
  Object.keys(fieldLabels).forEach(function(k){if(d[k]&&d[k].trim())responses+='['+fieldLabels[k]+']\n'+d[k]+'\n\n';});
  var a=co.ans||{};
  var financialCtx='';
  if(a.y1&&a.y2){
    financialCtx='Ventas '+co.y[0]+': $'+fmt(a.y1.er.v)+'K | '+co.y[1]+': $'+fmt(a.y2.er.v)+'K\n';
    financialCtx+='Util.Neta '+co.y[0]+': $'+fmt(a.y1.er.un)+'K | '+co.y[1]+': $'+fmt(a.y2.er.un)+'K\n';
    financialCtx+='Total Activo '+co.y[1]+': $'+fmt(a.y2.bg.ta)+'K | Capital: $'+fmt(a.y2.bg.cap)+'K\n';
  }
  var prompt='Eres evaluador academico de analisis financiero universitario (EBC Mexico).\n\n'+
    'EMPRESA: '+co.e+' '+co.n+' — '+co.s+'\nMision: '+co.mis+'\nVision: '+co.vis+'\n'+
    (financialCtx?'DATOS FINANCIEROS:\n'+financialCtx+'\n':'')+
    'EQUIPO: '+team.name+' | '+getMemberNames(team).join(', ')+'\n'+
    'ETAPA '+stage+': '+snames[stage]+'\n\n'+
    'RESPUESTAS:\n'+responses+'\n'+
    'Evalua con criterios (0-100 cada uno):\n'+
    '1. Profundidad del analisis\n2. Coherencia con datos\n3. Dominio conceptual\n4. Calidad interpretaciones\n5. CALIFICACION FINAL SUGERIDA\n\n'+
    'Da 3 FORTALEZAS especificas (cita sus palabras), 3 AREAS DE MEJORA con recomendaciones, y RETROALIMENTACION GENERAL.\nResponde en espanol.';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,
        messages:[{role:'user',content:prompt}]})});
    var data=await resp.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'Sin respuesta';
    A.aiEvalLoading=false;A.aiEvalResult=text;render();
  }catch(e){A.aiEvalLoading=false;A.aiEvalResult='Error: '+e.message;render();}
}

async function doExcelExport(){
  if(!window.XLSX){
    await new Promise(function(resolve){
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload=resolve;document.head.appendChild(s);
    });
  }
  var WB=window.XLSX.utils.book_new();
  var teams=DB.getTeams().filter(function(t){return t.companyId;});
  var subs=DB.getSubs();var evs=DB.getEvals();var tEvs=DB.getTeacherEvals();
  var snames=['','Empresa y Canvas','Estados Financieros','Razones Liq.','H y V + EFE','P. Equilibrio'];
  // Sheet 1: Calificaciones
  var s1=[['Equipo','Empresa','Sector','Integrantes','E1(10%)','E2(25%)','E3(20%)','E4(30%)','E5(15%)','Ponderada','Coeval%','Eval.Docente']];
  teams.forEach(function(t){
    var co=getC(t.companyId);var ts=subs[t.id]||{};
    var tev=tEvs.filter(function(e){return e.teamId===t.id;});
    var tevAvg=tev.length?Math.round(tev.reduce(function(s,e){return s+(e.grade||0);},0)/tev.length):'-';
    s1.push([t.name,co?co.n:'?',co?co.s:'',getMemberNames(t).join(', '),
      ts[1]?ts[1].score:'—',ts[2]?ts[2].score:'—',ts[3]?ts[3].score:'—',ts[4]?ts[4].score:'—',ts[5]?ts[5].score:'—',
      calcWeightedGrade(t.id),calcParticipation(t.id)+'%',tevAvg]);
  });
  window.XLSX.utils.book_append_sheet(WB,window.XLSX.utils.aoa_to_sheet(s1),'Calificaciones');
  // Sheet 2: Respuestas abiertas
  var fieldMap={s1a:[1,'Por que eligieron la empresa'],s1b:[1,'Entorno externo'],s1c:[1,'Coherencia modelo'],
    s1bmc_propuesta:[1,'Canvas PV'],s1bmc_segmentos:[1,'Canvas Segmentos'],s1bmc_ingresos:[1,'Canvas Ingresos'],
    s1bmc_costos:[1,'Canvas Costos'],s1bmc_socios:[1,'Canvas Socios'],s1bmc_actividades:[1,'Canvas Actividades'],
    s1bmc_recursos:[1,'Canvas Recursos'],s1bmc_canales:[1,'Canvas Canales'],
    s2g1:[2,'Estructura activos'],s2g2:[2,'Costos y PV'],s2g3:[2,'Financiamiento'],s2g4:[2,'Margen esperado'],
    s3i:[3,'Interpretacion liquidez'],s3opi:[3,'Ciclos operativos'],s3g1:[3,'Liquidez sectorial'],
    s4i:[4,'Diagnostico H+V+EFE'],s4efe:[4,'Flujo efectivo'],s4g1:[4,'Factores crecimiento'],
    s5i:[5,'Interpretacion PE'],s5g1:[5,'Por que PE ponderado'],s5g2:[5,'Portafolio'],s5g3:[5,'Palancas PE']};
  var s2=[['Equipo','Empresa','Etapa','Criterio','Respuesta del Equipo']];
  teams.forEach(function(t){var co=getC(t.companyId);var ts=subs[t.id]||{};
    Object.keys(fieldMap).forEach(function(k){var m=fieldMap[k];var sub=ts[m[0]];
      if(sub&&sub.data&&sub.data[k]&&sub.data[k].trim())
        s2.push([t.name,co?co.n:'?',m[0]+': '+snames[m[0]],m[1],sub.data[k]]);
    });
  });
  window.XLSX.utils.book_append_sheet(WB,window.XLSX.utils.aoa_to_sheet(s2),'Respuestas Abiertas');
  // Sheet 3: Coevaluaciones
  var s3=[['Equipo Evaluado','Empresa','Evaluador','Etapa','Criterio','Calificacion','Comentario']];
  evs.forEach(function(ev){var t=teams.find(function(t){return t.id===ev.teamId;});var co=t?getC(t.companyId):null;
    var rubric=RUBRICS[ev.stage||1];
    if(rubric&&ev.rubricScores){rubric.criteria.forEach(function(c){var v=ev.rubricScores[c.id];
      if(v)s3.push([t?t.name:'?',co?co.n:'?',ev.evalName||'?',ev.stage||1,c.name,v,ev.comment||'']);});}
    else{s3.push([t?t.name:'?',co?co.n:'?',ev.evalName||'?',ev.stage||1,'General','—',ev.comment||'']);}
  });
  window.XLSX.utils.book_append_sheet(WB,window.XLSX.utils.aoa_to_sheet(s3),'Coevaluaciones');
  // Sheet 4: Eval Docente
  var s4=[['Equipo','Empresa','Etapa','Calificacion','Retroalimentacion','Fecha']];
  tEvs.forEach(function(ev){var t=teams.find(function(t){return t.id===ev.teamId;});var co=t?getC(t.companyId):null;
    s4.push([t?t.name:'?',co?co.n:'?',ev.stage,ev.grade,ev.feedback||'',new Date(ev.createdAt).toLocaleDateString('es-MX')]);
  });
  window.XLSX.utils.book_append_sheet(WB,window.XLSX.utils.aoa_to_sheet(s4),'Eval Docente');
  // Sheet 5: Instrucciones IA
  var s5=[['INSTRUCCIONES PARA EVALUACION CON IA'],[''],
    ['1. Abre una nueva conversacion en claude.ai'],
    ['2. Adjunta este archivo Excel'],['3. Usa este prompt:'],[''],
    ['--- PROMPT ---'],
    ['Eres evaluador academico de analisis financiero (EBC Mexico).'],
    ['Analiza la hoja "Respuestas Abiertas" y evalua cada equipo:'],
    ['- Profundidad del analisis financiero'],['- Coherencia con los datos'],
    ['- Dominio conceptual'],['- Calidad de interpretaciones'],[''],
    ['Para cada equipo da: calificacion sugerida (0-100), 3 fortalezas con citas,'],
    ['3 areas de mejora con recomendaciones, retroalimentacion general.'],
    ['Al final genera tabla comparativa de todos los equipos.'],
  ];
  window.XLSX.utils.book_append_sheet(WB,window.XLSX.utils.aoa_to_sheet(s5),'Instrucciones IA');
  window.XLSX.writeFile(WB,'FinAcademy_'+new Date().toLocaleDateString('es-MX').replace(/\//g,'-')+'.xlsx');
  msg('Excel descargado: '+teams.length+' equipos, '+(s2.length-1)+' respuestas.','ok');}


function doDeleteTeam(tid){
  if(!tid)return;
  var teams=DB.getTeams().filter(function(t){return t.id!==tid;});DB.saveTeams(teams);
  var subs=DB.getSubs();delete subs[tid];DB.saveSubs(subs);
  var evs=DB.getEvals().filter(function(e){return e.teamId!==tid;});DB.saveEvals(evs);
  SYNC.deleteTeam(tid);
  msg('Equipo eliminado.','ok');ss({teacherTab:A.teacherTab||'equipos'});}

function doDeleteUser(uid_){
  if(!uid_||uid_==='teacher'||uid_==='demo')return;
  var users=DB.getUsers().filter(function(u){return u.id!==uid_;});DB.saveUsers(users);
  var teams=DB.getTeams();
  teams.forEach(function(t){t.members=(t.members||[]).filter(function(id){return id!==uid_;});});
  DB.saveTeams(teams);SYNC.deleteUser(uid_);
  msg('Usuario eliminado.','ok');ss({teacherTab:'alumnos'});}

function doResetTeam(tid){
  if(!tid)return;
  var subs=DB.getSubs();delete subs[tid];DB.saveSubs(subs);
  SYNC.deleteTeamSubs(tid);
  msg('Entregas reiniciadas.','ok');ss({teacherTab:A.teacherTab||'equipos'});}

function doChangeCompany(tid){
  var teams=DB.getTeams();var t=teams.find(function(t){return t.id===tid;});if(!t)return;
  var options=COS.map(function(c,i){return (i+1)+'. '+c.e+' '+c.n;}).join('\n');
  var idx=parseInt(prompt('Elige empresa (1-8):\n'+options))-1;
  if(idx>=0&&idx<COS.length){
    t.companyId=COS[idx].id;t.status='active';
    DB.saveTeams(teams);SYNC.pushTeam(t);
    msg('Empresa cambiada a '+COS[idx].n+'.','ok');ss({teacherTab:'equipos'});
  }}

function doEditScore(tid,stage){
  var subs=DB.getSubs();
  if(!subs[tid]||!subs[tid][stage]){msg('Sin entrega.','warn');return;}
  var cur=subs[tid][stage].score||0;
  var nuevo=parseInt(prompt('Puntaje actual: '+cur+'%\nNuevo (0-100):',cur));
  if(!isNaN(nuevo)&&nuevo>=0&&nuevo<=100){
    subs[tid][stage].score=nuevo;DB.saveSubs(subs);
    SYNC.pushSub(tid,stage,subs[tid][stage]);
    msg('Puntaje: '+nuevo+'%','ok');ss({teacherTab:'scores'});
  }}

function doUnlockCompany(tid){
  var teams=DB.getTeams();var t=teams.find(function(t){return t.id===tid;});if(!t)return;
  t.companyId=null;t.status='open';
  DB.saveTeams(teams);SYNC.pushTeam(t);
  msg('Empresa liberada.','ok');ss({teacherTab:'empresas'});}

function doAssignCoToTeam(coId){
  var teams=DB.getTeams();var available=teams.filter(function(t){return!t.companyId;});
  if(!available.length){msg('Sin equipos en lobby.','warn');return;}
  var options=available.map(function(t,i){return(i+1)+'. '+t.name;}).join('\n');
  var idx=parseInt(prompt('Asignar a:\n'+options))-1;
  if(idx>=0&&idx<available.length){
    var t=available[idx];t.companyId=coId;t.status='active';
    DB.saveTeams(teams);SYNC.pushTeam(t);
    msg('Asignado a '+t.name,'ok');ss({teacherTab:'empresas'});
  }}

function doMoveUser(){
  var uid=A.inp.moveUser;var tid=A.inp.moveTeam;
  if(!uid||!tid){msg('Selecciona alumno y equipo destino.','warn');return;}
  var teams=DB.getTeams();
  var oldTeam=teams.find(function(t){return(t.members||[]).includes(uid);});
  if(oldTeam){
    oldTeam.members=oldTeam.members.filter(function(id){return id!==uid;});
    if(oldTeam.members.length<oldTeam.maxMembers)oldTeam.status='open';
    SYNC.pushTeam(oldTeam);
  }
  var dest=teams.find(function(t){return t.id===tid;});
  if(dest){
    if(!(dest.members||[]).includes(uid)){
      dest.members=(dest.members||[]).concat([uid]);
      var u=DB.getUsers().find(function(u){return u.id===uid;});
      if(u&&!(dest.memberNames||[]).includes(u.name))dest.memberNames=(dest.memberNames||[]).concat([u.name]);
    }
    SYNC.pushTeam(dest);
  }
  DB.saveTeams(teams);
  msg('Alumno movido a '+(dest?dest.name:'?')+'.','ok');
  ss({teacherTab:'mover'});}

function doAssignRole(roleId,uid){
  if(!uid)return;
  var teams=DB.getTeams();
  var t=teams.find(function(t){return(t.members||[]).includes(A.user.id)&&t.leaderId===A.user.id;});
  if(!t)return;
  if(!t.roles)t.roles={};
  // Remove uid from any existing role first
  Object.keys(t.roles).forEach(function(r){if(t.roles[r]===uid)delete t.roles[r];});
  t.roles[roleId]=uid;
  DB.saveTeams(teams);SYNC.pushTeam(t);
  ss({});}

function doUnassignRole(roleId){
  var teams=DB.getTeams();
  var t=teams.find(function(t){return t.leaderId===A.user.id;});
  if(!t||!t.roles)return;
  delete t.roles[roleId];
  DB.saveTeams(teams);SYNC.pushTeam(t);
  ss({});}

function doAutoAssignRoles(){
  var teams=DB.getTeams();
  var t=teams.find(function(t){return t.leaderId===A.user.id;});
  if(!t)return;
  var members=[].concat(t.members||[]);
  t.roles={};
  // Shuffle and assign
  var roleIds=TEAM_ROLES.map(function(r){return r.id;});
  for(var i=roleIds.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=roleIds[i];roleIds[i]=roleIds[j];roleIds[j]=tmp;}
  members.forEach(function(uid,i){if(i<roleIds.length)t.roles[roleIds[i]]=uid;});
  DB.saveTeams(teams);SYNC.pushTeam(t);
  msg('Roles asignados aleatoriamente. Puedes ajustarlos antes de confirmar.','ok');
  ss({});}

function doConfirmRoles(){
  var teams=DB.getTeams();
  var t=teams.find(function(t){return t.leaderId===A.user.id;});
  if(!t)return;
  t.rolesConfirmed=true;
  DB.saveTeams(teams);SYNC.pushTeam(t);
  A.screen='lobby';render();}

async function doImportStudentsExcel(){
  // Load XLSX if needed
  if(!window.XLSX){
    await new Promise(function(resolve){
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload=resolve;document.head.appendChild(s);
    });
  }
  var input=document.createElement('input');
  input.type='file';input.accept='.xlsx,.xls,.csv';
  input.onchange=async function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=async function(ev){
      try{
        var wb=window.XLSX.read(ev.target.result,{type:'binary'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        var users=DB.getUsers();
        var added=0,skipped=0;
        rows.forEach(function(row){
          if(!row[0]&&!row[1])return;
          var code=String(row[0]||'').trim();
          var email=String(row[1]||'').trim().toLowerCase();
          if(!code&&!email)return;
          // Normalize: add M prefix if missing
          if(code&&!code.startsWith('M')&&!code.startsWith('m'))code='M'+code;
          code=code.toUpperCase();
          if(!email||!email.includes('@')){skipped++;return;}
          // Check if already exists
          if(users.find(function(u){return u.email===email||u.studentCode===code;})){skipped++;return;}
          // Clean name from email
          var prefix=email.split('@')[0];
          var parts=prefix.split('.');
          var nameParts=[];
          parts.forEach(function(p){
            var pc=p.replace(/\d+$/,'');
            if(pc)nameParts.push(pc.length<=2?pc.toUpperCase()+'.':pc.charAt(0).toUpperCase()+pc.slice(1));
          });
          var name=nameParts.join(' ')||email.split('@')[0];
          var u={id:'stu_'+code,name:name,email:email,studentCode:code,
                 role:'student',memberNames:[name],password:'',createdAt:Date.now()};
          users.push(u);added++;
          SYNC.pushUser(u);
        });
        DB.saveUsers(users);
        msg('✅ Importados '+added+' alumnos nuevos. ('+skipped+' omitidos por duplicados o datos incompletos)','ok');
        ss({teacherTab:'alumnos'});
      }catch(err){msg('Error al leer el archivo: '+err.message,'err');}
    };
    reader.readAsBinaryString(file);
  };
  input.click();}

function doAddStudentManual(){
  var email=(A.inp.new_email||'').trim().toLowerCase();
  var code=(A.inp.new_code||'').trim().toUpperCase();
  if(!email||!email.includes('@')){msg('Correo inválido.','warn');return;}
  if(!code){msg('Ingresa la clave de estudiante.','warn');return;}
  if(!code.startsWith('M'))code='M'+code;
  var users=DB.getUsers();
  if(users.find(function(u){return u.email===email||u.studentCode===code;})){
    msg('Ya existe un alumno con ese correo o clave.','warn');return;
  }
  var prefix=email.split('@')[0];
  var parts=prefix.split('.');
  var nameParts=[];
  parts.forEach(function(p){
    var pc=p.replace(/\d+$/,'');
    if(pc)nameParts.push(pc.length<=2?pc.toUpperCase()+'.':pc.charAt(0).toUpperCase()+pc.slice(1));
  });
  var name=nameParts.join(' ')||prefix;
  var u={id:'stu_'+code,name:name,email:email,studentCode:code,
         role:'student',memberNames:[name],password:'',createdAt:Date.now()};
  users.push(u);DB.saveUsers(users);SYNC.pushUser(u);
  msg('✅ Alumno '+name+' ('+code+') agregado.','ok');
  A.inp.new_email='';A.inp.new_code='';
  ss({teacherTab:'alumnos'});}

function rTCoevals(){
  var teams=DB.getTeams().filter(function(t){return t.companyId;});
  var evs=DB.getEvals();
  var users=DB.getUsers();
  var snames=['','Empresa','Est.Fin.','Razones','H+V+EFE','PE'];

  // Build matrix: evaluator → teams evaluated per stage
  var evalMatrix={};
  evs.forEach(function(ev){
    if(!evalMatrix[ev.evalId])evalMatrix[ev.evalId]={};
    var key=ev.teamId+'_'+(ev.stage||1);
    evalMatrix[ev.evalId][key]={score:ev.rubricScores,comment:ev.comment,stage:ev.stage||1};
  });

  // Summary cards
  var totalEvs=evs.length;
  var uniqueEvaluators=Object.keys(evalMatrix).length;
  var avgRubric=0;
  if(evs.length){
    var total=0,cnt=0;
    evs.forEach(function(ev){
      var rubric=RUBRICS[ev.stage||1];
      if(rubric&&ev.rubricScores){
        rubric.criteria.forEach(function(c){
          var v=parseInt((ev.rubricScores||{})[c.id]||0);
          if(v){total+=v;cnt++;}
        });
      }
    });
    avgRubric=cnt?Math.round(total/cnt*10)/10:0;
  }

  return'<div>'+
    '<div class="g4c mb14">'+
      '<div class="metric"><div class="metric-l">Total coevaluaciones</div><div class="metric-v">'+totalEvs+'</div></div>'+

function calcEvalQuality(team){
  var evs=DB.getEvals().filter(function(e){
    return (team.members||[]).includes(e.evalId)||e.evalId===team.id;
  });
  if(!evs.length)return 0;
  var acc=0,cnt=0;
  evs.forEach(function(ev){
    var rubric=RUBRICS[ev.stage||1];
    if(!rubric||!ev.rubricScores)return;
    var sum=0,n=0;
    rubric.criteria.forEach(function(c){
      var v=parseInt((ev.rubricScores||{})[c.id]||0);
      if(v>0){sum+=v;n++;}
    });
    if(!n)return;
    acc+=Math.round(sum/n/4*100);cnt++;
  });
  return cnt?Math.round(acc/cnt):0;}


function calcParticipation(teamId){
  var team=DB.getTeams().find(function(t){return t.id===teamId;});
  if(!team)return 0;
  var evaluable=DB.getTeams().filter(function(t){return t.companyId&&t.id!==teamId&&teamProg(t.id)>0;});
  if(!evaluable.length)return 100;
  var allEvs=DB.getEvals();
  var memberIds=team.members||[];
  var evs=allEvs.filter(function(e){return memberIds.includes(e.evalId);});
  var uniqueTeams=new Set(evs.map(function(e){return e.teamId;})).size;
  return Math.min(100,Math.round(uniqueTeams/evaluable.length*100));}

  else if(stage===5){

    body+='<div class="section">'+sec('ANÁLISIS GUIADO — COMPRENSIÓN DEL PUNTO DE EQUILIBRIO');
    ['s5g1','s5g2','s5g3'].forEach(function(k,i){body+=ans(['Por qué usar PE ponderado','Análisis del portafolio de productos','Palancas para reducir el PE'][i],d[k]);});
    body+='</div>';

    body+='<div class="section">'+sec('DATOS DEL MODELO DE PUNTO DE EQUILIBRIO')+
      '<table><tr><th>Concepto</th><th class="r">Valor</th><th>Explicación</th></tr>'+
      '<tr><td>Gastos Operativos (GFO)</td><td class="r">$'+fmtN(be.gf.op)+'K</td><td>Renta, sueldos, servicios, depreciación</td></tr>'+
      '<tr><td>Gastos No Operativos (GNO)</td><td class="r">$'+fmtN(be.gf.nop)+'K</td><td>Intereses bancarios, comisiones financieras</td></tr>'+
      '<tr><td>Tasa ISR (T)</td><td class="r">'+be.t*100+'%</td><td>Impuesto Sobre la Renta aplicable</td></tr>'+
      '<tr><td>Utilidad Esperada (UE)</td><td class="r">$'+fmtN(be.gf.ue)+'K</td><td>Ganancia mínima requerida por la empresa</td></tr>'+
      '<tr class="subtotal"><td>Numerador = (GFO+GNO)×(1−T)+UE</td><td class="r">$'+fmtN(be.num/1000)+'K</td><td>Meta total a cubrir con las ventas</td></tr>'+
      '</table></div>';

    body+='<div class="section">'+sec('MARGEN DE CONTRIBUCIÓN PONDERADO — PORTAFOLIO DE '+co.n.toUpperCase())+
      '<table><tr><th>Producto / Servicio</th><th class="r">Precio Venta</th><th class="r">Costo Variable</th><th class="r">MC Unitario</th><th class="r">% Participación</th><th class="r">MC Ponderado</th></tr>'+
      be.pr.map(function(p){
        var mc=p.pv-p.cv;var mcp=Math.round(mc*p.p*100)/100;
        return'<tr><td>'+p.n+'</td><td class="r">$'+fmtN(p.pv,0)+'</td><td class="r">$'+fmtN(p.cv,0)+'</td><td class="r">$'+fmtN(mc,0)+'</td><td class="r">'+(p.p*100).toFixed(0)+'%</td><td class="r">$'+fmtN(mcp)+'</td></tr>';
      }).join('')+
      '<tr class="total"><td colspan="5">MCP Total (denominador de la fórmula)</td><td class="r">$'+fmtN(be.mc)+'</td></tr>'+
      '</table></div>';

    body+='<div class="section">'+sec('RESULTADO FINAL')+
      '<table style="max-width:400px"><tr><th>Concepto</th><th class="r">Valor</th></tr>'+
      '<tr><td>Numerador (meta total)</td><td class="r">$'+fmtN(be.num/1000)+'K</td></tr>'+
      '<tr><td>MCP Total (denominador)</td><td class="r">$'+fmtN(be.mc)+'</td></tr>'+
      '<tr class="total" style="font-size:14px"><td>PUNTO DE EQUILIBRIO PONDERADO</td><td class="r pos">'+Math.ceil(be.num/be.mc)+' unidades</td></tr>'+
      '</table>'+
      ans('Interpretación: ¿qué significa este PE para '+co.n+'?',d.s5i)+
      '</div>';
  }

  // ── CO-EVALUACIONES RECIBIDAS ─────────────────────────────────
  if(evs.length){
    body+='<div class="section">'+sec('CO-EVALUACIONES RECIBIDAS DE PARES ('+evs.length+')')+
      evs.map(function(ev){
        var rubric=RUBRICS[stage];
        var rubricRows='';
        if(rubric&&ev.rubricScores){
          var lNames={4:'Excelente',3:'Bueno',2:'Regular',1:'Insuficiente'};
          rubricRows='<table class="rubric-table" style="margin-top:6px"><tr><th>Criterio</th><th class="r">Calificación</th><th>Nivel</th></tr>'+
            rubric.criteria.map(function(c){
              var v=parseInt(ev.rubricScores[c.id]||0);
              return'<tr><td>'+c.name+'</td><td class="r"><strong>'+v+'/4</strong></td><td>'+(v>0?lNames[v]:'—')+'</td></tr>';
            }).join('')+'</table>';
        }
        return'<div class="coeval-card">'+
          '<div class="coeval-header">'+
            '<span class="coeval-name">'+ev.evalName+'</span>'+
            '<span style="font-size:11px;color:#666">'+new Date(ev.createdAt).toLocaleDateString('es-MX')+'</span>'+
          '</div>'+
          rubricRows+
          (ev.comment?'<div style="margin-top:6px;font-size:11px;border-top:1px solid #ffc107;padding-top:6px"><strong>Comentario:</strong> '+ev.comment+'</div>':'')+
        '</div>';
      }).join('')+
      '</div>';
  }

  // === RENDER WINDOW ===
  var w=window.open('','_blank','width=980,height=800');
  if(!w){alert('Activa los popups en tu navegador para ver el PDF.');return;}
  var dateStr=new Date().toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'});
  w.document.write([
    '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">',
    '<title>Reporte Etapa '+stage+' — '+snames[stage]+' — '+team.name+'</title>',
    '<style>'+css+'</style></head><body>',
    '<div class="no-print">',
    '<button onclick="window.print()" style="padding:9px 22px;background:'+corte.color+';color:#fff;border:none;border-radius:7px;cursor:pointer;margin-right:8px;font-size:13px;font-weight:600">🖨️ Guardar como PDF</button>',
    '<button onclick="window.close()" style="padding:9px 16px;border:1px solid #ccc;border-radius:7px;cursor:pointer;font-size:13px">✕ Cerrar</button>',
    '<span style="margin-left:16px;font-size:11px;color:#666">Tip: En el diálogo de impresión selecciona "Guardar como PDF" como destino</span>',
    '</div>',
    '<div class="cover">',
    '<h1>'+co.e+' '+co.n+'</h1>',
    '<h2>Etapa '+stage+': '+snames[stage]+'</h2>',
    '<div class="meta">',
    '<strong>'+corte.name+'</strong> &nbsp;·&nbsp; Ponderación: '+WEIGHTS[stage]+'%<br>',
    'Equipo: <strong>'+team.name+'</strong><br>',
    'Integrantes: '+members+'<br>',
    'Entregada: '+new Date(sub.submittedAt).toLocaleString('es-MX')+'<br>',
    'Reporte generado: '+dateStr,
    '</div>',
    '</div>',
    '<div class="score-box">Precisión numérica: '+sub.score+'% &nbsp;·&nbsp; Ponderación etapa: '+WEIGHTS[stage]+'% &nbsp;·&nbsp; Calificación ponderada aportada: '+Math.round(sub.score*WEIGHTS[stage]/100)+' pts</div>',
    body,
    '<div class="footer">FinAcademy — Escuela Bancaria y Comercial &nbsp;·&nbsp; '+co.e+' '+co.n+' &nbsp;·&nbsp; Equipo: '+team.name+'</div>',
    '</body></html>'
  ].join(''));
  w.document.close();}

function rCoeval(team,co){
  var others=DB.getTeams().filter(function(t){return t.companyId&&t.id!==team.id&&teamProg(t.id)>0;});
  var myEvals=DB.getEvals().filter(function(e){return e.evalId===A.user.id;});
  var tgt=A.evalTarget||(others[0]?others[0].id:null);
  var etm=tgt?DB.getTeams().find(function(t){return t.id===tgt;}):null;
  var eco=etm?getC(etm.companyId):null;
  var evalStage=A.evalStage||1;
  var existEval=tgt?myEvals.find(function(e){return e.teamId===tgt&&(e.stage===evalStage);}):null;
  var sLabels=['','Empresa','Est.Fin.','Razones','H+V+EFE','PE'];
  var evDone=new Set(myEvals.map(function(e){return e.teamId+'_'+(e.stage||1);})).size;
  var evTotal=others.length*5;
  var partPct=evTotal?Math.round(evDone/evTotal*100):0;

  function rubricBlock(s){
    var rubric=RUBRICS[s];if(!rubric)return'';
    var out='<div class="fw7 f12 mb10">Rubrica de evaluacion — Etapa '+s+'</div>';
    rubric.criteria.forEach(function(c){
      out+='<div class="rb-wrap">';
      out+='<div class="rb-title">'+c.name+'</div>';
      out+='<div class="rb-desc">'+c.desc+'</div>';
      out+='<div class="rb-levels">';
      var lNames={4:'Excelente',3:'Bueno',2:'Regular',1:'Insuf.'};
      [4,3,2,1].forEach(function(v){
        var key='rc_'+s+'_'+c.id;
        var stored=parseInt(A.inp[key]||(existEval&&existEval.rubricScores&&existEval.rubricScores[c.id])||0);
        var isSel=stored===v;
        out+='<div class="rbl s'+v+(isSel?' sel':'')+'" data-rv="'+v+'" data-rcid="'+key+'">';
        out+='<span class="rv">'+v+'</span><span class="rl">'+lNames[v]+'</span></div>';
      });
      out+='</div>';
      var sel=parseInt(A.inp['rc_'+s+'_'+c.id]||(existEval&&existEval.rubricScores&&existEval.rubricScores[c.id])||0);
      if(sel>0){out+='<div class="rbl-hint">'+c.lvl[sel]+'</div>';}
      out+='</div>';
    });
    return out;
  }

  var OPEN={
    1:[{id:'s1a',lbl:'Por que eligieron esta empresa'},{id:'s1b',lbl:'Entorno externo'},{id:'s1c',lbl:'Coherencia del modelo'},{id:'s1bmc_propuesta',lbl:'Canvas: Propuesta de Valor'},{id:'s1bmc_segmentos',lbl:'Canvas: Segmentos'},{id:'s1bmc_ingresos',lbl:'Canvas: Fuentes de Ingreso'}],
    2:[{id:'s2g1',lbl:'Estructura de activos'},{id:'s2g2',lbl:'Costos y PV'},{id:'s2g3',lbl:'Financiamiento'},{id:'s2g4',lbl:'Margen esperado'}],
    3:[{id:'s3i',lbl:'Interpretacion liquidez'},{id:'s3opi',lbl:'Ciclos operativos'},{id:'s3g1',lbl:'Liquidez del sector'}],
    4:[{id:'s4i',lbl:'Diagnostico H+V+EFE'},{id:'s4g1',lbl:'Tendencias del sector'},{id:'s4g2',lbl:'Eficiencia operativa'}],
    5:[{id:'s5i',lbl:'Interpretacion PE'},{id:'s5g2',lbl:'Portafolio'},{id:'s5g3',lbl:'Palancas PE'}],
  };

  var rightPanel='';
  if(!etm||!eco){
    rightPanel='<div class="card-ghost" style="text-align:center;padding:32px"><p class="t2 f12">Selecciona un equipo para evaluar</p></div>';
  } else {
    var subs=DB.getSubs()[etm.id]||{};
    var stageTabs='<div class="tabs">';
    [1,2,3,4,5].forEach(function(s){
      var hasSub=!!subs[s];
      var evd=myEvals.some(function(e){return e.teamId===tgt&&e.stage===s;});
      stageTabs+='<div class="tab'+(evalStage===s?' active':'')+(hasSub?'':' locked')+'"'+(hasSub?' data-evalstage="'+s+'"':'')+' style="'+(hasSub?'':'opacity:.35;cursor:not-allowed;pointer-events:none')+'">';
      stageTabs+=sLabels[s]+' <span class="wbadge">'+WEIGHTS[s]+'%</span>'+(evd?' <span class="badge bok f11">v</span>':'');
      stageTabs+='</div>';
    });
    stageTabs+='</div>';
    var rubric=RUBRICS[evalStage];
    var sub=subs[evalStage];
    var filled=rubric?rubric.criteria.filter(function(c){var key='rc_'+evalStage+'_'+c.id;return parseInt(A.inp[key]||(existEval&&existEval.rubricScores&&existEval.rubricScores[c.id])||0)>0;}).length:0;
    var openFields=sub?(OPEN[evalStage]||[]).filter(function(f){return sub.data&&sub.data[f.id]&&sub.data[f.id].trim().length>20;}):[];
    rightPanel='<div class="card">'+
      '<div class="flex g10 mb10">'+
        '<span style="font-size:20px">'+eco.e+'</span>'+
        '<div style="flex:1"><div class="fw7 f13">'+etm.name+'</div><div class="t2 f12">'+eco.n+'</div></div>'+
        '<button class="btn btn-sm btn-ok" data-coevalpdf="'+etm.id+'|'+evalStage+'" style="font-size:11px">&#x1F4E5; PDF del equipo</button>'+
        '</div>'+
      stageTabs+
      (existEval?'<div class="alert aok mb8 f12">Ya evaluaste esta etapa.</div>':'')+
      (!sub?'<p class="t2 f12">Aun no entrega esta etapa.</p>':
        '<div>'+
        rCoevalWork(sub,eco,evalStage,evalStage)+
        (openFields.length?
          '<div class="fw7 f12 mb8">Respuestas del equipo:</div>'+
          openFields.map(function(f){return'<div style="background:var(--s3);border-radius:7px;padding:7px 10px;margin-bottom:6px"><div class="t2 f11 mb2">'+f.lbl+'</div><div class="f11" style="line-height:1.55">'+sub.data[f.id].slice(0,260)+(sub.data[f.id].length>260?'...':'')+'</div></div>';}).join('')
          :'<div class="alert ai mb8 f12">Sin respuestas abiertas en esta etapa.</div>')+
        '<div class="sep"></div>'+
        rubricBlock(evalStage)+
        '<div class="alert '+(filled===(rubric?rubric.criteria.length:0)?'aok':'aw')+' mb10 f12">'+
          (rubric&&filled===rubric.criteria.length?'Rubrica completa ('+filled+'/'+rubric.criteria.length+')':'Completa la rubrica: '+filled+'/'+(rubric?rubric.criteria.length:0)+' criterios')+
        '</div>'+
        '<div class="lbl">Comentario general</div>'+
        '<textarea class="inp mb10" id="ev_comment" rows="2" placeholder="Fortalezas y areas de mejora..."></textarea>'+
        '<button class="btn btn-p" id="btnEval" data-tid="'+tgt+'" data-evals="'+evalStage+'">'+(existEval?'Actualizar':'Enviar evaluacion')+' E'+evalStage+'</button>'+
        '</div>')+
    '</div>';
  }

  return'<div class="fadein">'+
    '<div class="fbet mb12"><div><h2 class="f20">Coevaluacion con Rubrica</h2>'+
    '<p class="t2 f12">Evalua cada etapa con criterios especificos. Tu participacion impacta tu ranking.</p></div></div>'+
    '<div class="card-s mb12 flex g12">'+
      '<div style="text-align:center;min-width:72px"><div class="f20 fw7" style="color:'+(partPct>=70?'var(--green)':partPct>=40?'var(--yellow)':'var(--red)')+'">'+partPct+'%</div>'+
      '<div class="t3 f11">Participacion</div></div>'+
      '<div style="flex:1"><div class="prog"><div class="prog-f" style="width:'+partPct+'%"></div></div>'+
      '<div class="t2 f11 mt4">'+evDone+' de '+evTotal+' evaluaciones posibles</div></div>'+
    '</div>'+
    '<div class="card-s mb12"><div class="fw7 f12 mb8">Ponderacion de etapas:</div><div class="flex g8" style="flex-wrap:wrap">'+
    [1,2,3,4,5].map(function(s){var sn=['','Empresa','Est.Fin.','Razones','H+V','PE'][s];return'<div style="flex:1;min-width:80px;text-align:center;background:var(--s3);border-radius:7px;padding:6px 8px"><div class="f18 fw7" style="color:var(--yellow)">'+WEIGHTS[s]+'%</div><div class="t3 f11">E'+s+': '+sn+'</div></div>';}).join('')+
    '</div></div>'+
    '<div class="g2">'+
      '<div><div class="lbl mb8">Equipos disponibles</div>'+
      (others.length?others.map(function(t){var tc=getC(t.companyId);var evCount=myEvals.filter(function(e){return e.teamId===t.id;}).length;return'<div class="coc'+(t.id===tgt?' sel':'')+' mb8" data-et="'+t.id+'"><div class="fbet"><div class="flex g8"><span class="f18">'+(tc?tc.e:'?')+'</span><div><div class="fw6 f13">'+t.name+'</div><div class="t2 f11">'+(tc?tc.n:'?')+'</div></div></div><span class="badge '+(evCount>=5?'bok':evCount>0?'bwarn':'bmuted')+' f11">'+evCount+'/5</span></div></div>';}).join(''):'<p class="t2 f12">Sin equipos disponibles.</p>')+
      '</div>'+
      '<div>'+rightPanel+'</div>'+
    '</div>'+
  '</div>';}


function rCoevalWork(sub,co,stage,evalStage){
  if(!sub||!sub.data)return'';
  var d=sub.data;
  var co_=co;
  var a=co_.ans;
  var out='<div style="background:var(--s3);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden">';
  out+='<div style="padding:8px 14px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\'">';
  out+='<span style="font-size:14px">📂</span><span class="fw7 f12">Ver trabajo entregado — Etapa '+evalStage+'</span>';
  out+='<span class="t2 f11" style="margin-left:auto">clic para '+(d.s1a||d.s2g1||d.s3i||d.s4i||d.s5i?'expandir':'ver')+'</span></div>';
  out+='<div style="padding:14px;display:none">';

  function ansBlock(label,text){
    if(!text||!text.trim())return'';
    return'<div style="margin-bottom:10px"><div class="t2 f11 mb3">'+label+'</div>'+
      '<div style="background:var(--s1);border-left:3px solid var(--p);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;line-height:1.65">'+text+'</div></div>';}

  if(evalStage===1){
    out+=ansBlock('¿Por qué eligieron esta empresa?',d.s1a);
    out+=ansBlock('Análisis del entorno externo',d.s1b);
    out+=ansBlock('Coherencia del modelo de negocio',d.s1c);
    var ckeys=['propuesta','segmentos','ingresos','costos','socios','actividades','recursos','relaciones','canales'];
    var clabels={propuesta:'Propuesta de Valor',segmentos:'Segmentos',ingresos:'Fuentes de Ingreso',costos:'Estructura de Costos',socios:'Socios Clave',actividades:'Actividades Clave',recursos:'Recursos Clave',relaciones:'Relaciones con Clientes',canales:'Canales'};
    var hasCanvas=ckeys.some(function(k){return d['s1bmc_'+k];});
    if(hasCanvas){
      out+='<div class="fw7 f12 mb8" style="margin-top:8px">Business Model Canvas:</div>';
      out+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
      ckeys.forEach(function(k){
        if(d['s1bmc_'+k]){
          out+='<div style="background:var(--s1);border-radius:6px;padding:7px 10px;border:1px solid var(--border)">'+
            '<div class="t2 f10 mb2">'+clabels[k]+'</div>'+
            '<div class="f11" style="line-height:1.55">'+d['s1bmc_'+k].slice(0,200)+(d['s1bmc_'+k].length>200?'...':'')+'</div>'+
          '</div>';
        }
      });
      out+='</div>';
    }
  } else if(evalStage===2){
    ['s2g1','s2g2','s2g3','s2g4'].forEach(function(k,i){
      out+=ansBlock(['Estructura de activos','Costos y propuesta de valor','Estrategia de financiamiento','Margen esperado'][i],d[k]);
    });
    // Show key financials
    if(a.y1&&a.y2){
      out+='<div class="fw7 f12 mb6 mt8">Resumen financiero:</div>';
      out+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';
      var metrics=[
        {l:'Ventas '+co_.y[0],v:'$'+fmt(a.y1.er.v)+'K'},
        {l:'Ventas '+co_.y[1],v:'$'+fmt(a.y2.er.v)+'K'},
        {l:'Util.Neta '+co_.y[1],v:'$'+fmt(a.y2.er.un)+'K'},
        {l:'Total Activo '+co_.y[1],v:'$'+fmt(a.y2.bg.ta)+'K'},
        {l:'Capital '+co_.y[1],v:'$'+fmt(a.y2.bg.cap)+'K'},
        {l:'Total Pasivo '+co_.y[1],v:'$'+fmt(a.y2.bg.tp)+'K'},
      ];
      metrics.forEach(function(m){
        out+='<div style="background:var(--s1);border-radius:6px;padding:6px 8px;text-align:center">'+
          '<div class="t2 f10">'+m.l+'</div><div class="fw7 f12">'+m.v+'</div></div>';
      });
      out+='</div>';
    }
  } else if(evalStage===3){
    out+=ansBlock('Interpretación de liquidez',d.s3i);
    out+=ansBlock('Interpretación ciclos operativos',d.s3opi);
    ['s3g1','s3g2','s3g3'].forEach(function(k,i){
      out+=ansBlock(['Liquidez óptima del sector','Rol del inventario','Ciclo de cobro y pago'][i],d[k]);
    });
    // Key ratios
    if(a.y1&&a.y2){
      out+='<div class="fw7 f12 mb6 mt8">Razones clave:</div>';
      out+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">';
      [
        {l:'Razón Corriente '+co_.y[0],v:a.y1.rat.rc+'x'},{l:'Razón Corriente '+co_.y[1],v:a.y2.rat.rc+'x'},
        {l:'Prueba Ácida '+co_.y[1],v:a.y2.rat.pa+'x'},{l:'Ciclo Efectivo '+co_.y[1],v:a.y2.op.ce+' días'},
      ].forEach(function(m){
        out+='<div style="background:var(--s1);border-radius:6px;padding:6px 8px;text-align:center">'+
          '<div class="t2 f10">'+m.l+'</div><div class="fw7 f12">'+m.v+'</div></div>';
      });
      out+='</div>';
    }
  } else if(evalStage===4){
    out+=ansBlock('Diagnóstico integral H y V + EFE',d.s4i);
    out+=ansBlock('Interpretación del flujo de efectivo',d.s4efe);
    ['s4g1','s4g2','s4g3'].forEach(function(k,i){
      out+=ansBlock(['Factores de crecimiento','Eficiencia operativa','Evolución de activos'][i],d[k]);
    });
    // Key HV data
    if(a.h){

  (tsv==='company'&&isLeader?rTMCompany(team):'')+
  (tsv==='info'?rTMInfo(team,mems,ldr):'')+
  (!isLeader?'<div class="mt20"><button class="btn btn-danger btn-sm" id="btnLeaveTeam" data-tid="'+team.id+'">🚪 Salir del equipo</button></div>':'')+'</div>';}


function sHdr(n,title,desc,done){return '<div style="margin-bottom:20px"><div class="flex g8 mb8"><span class="badge bp">Etapa '+n+'</span>'+(done?'<span class="badge bok">✓ Entregada</span>':'')+'</div><h2 style="font-size:20px;margin-bottom:4px">'+title+'</h2><p class="t2 f13">'+desc+'</p></div>';}


function rCoevalWork(sub,co,stage,evalStage){
  if(!sub||!sub.data)return'';
  var d=sub.data;
  var co_=co;
  var a=co_.ans;
  var out='<div style="background:var(--s3);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden">';
  out+='<div style="padding:8px 14px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\'">';
  out+='<span style="font-size:14px">📂</span><span class="fw7 f12">Ver trabajo entregado — Etapa '+evalStage+'</span>';
  out+='<span class="t2 f11" style="margin-left:auto">clic para '+(d.s1a||d.s2g1||d.s3i||d.s4i||d.s5i?'expandir':'ver')+'</span></div>';
  out+='<div style="padding:14px;display:none">';

  function ansBlock(label,text){
    if(!text||!text.trim())return'';
    return'<div style="margin-bottom:10px"><div class="t2 f11 mb3">'+label+'</div>'+
      '<div style="background:var(--s1);border-left:3px solid var(--p);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;line-height:1.65">'+text+'</div></div>';}

  if(evalStage===1){
    out+=ansBlock('¿Por qué eligieron esta empresa?',d.s1a);
    out+=ansBlock('Análisis del entorno externo',d.s1b);
    out+=ansBlock('Coherencia del modelo de negocio',d.s1c);
    var ckeys=['propuesta','segmentos','ingresos','costos','socios','actividades','recursos','relaciones','canales'];
    var clabels={propuesta:'Propuesta de Valor',segmentos:'Segmentos',ingresos:'Fuentes de Ingreso',costos:'Estructura de Costos',socios:'Socios Clave',actividades:'Actividades Clave',recursos:'Recursos Clave',relaciones:'Relaciones con Clientes',canales:'Canales'};
    var hasCanvas=ckeys.some(function(k){return d['s1bmc_'+k];});
    if(hasCanvas){
      out+='<div class="fw7 f12 mb8" style="margin-top:8px">Business Model Canvas:</div>';
      out+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
      ckeys.forEach(function(k){
        if(d['s1bmc_'+k]){
          out+='<div style="background:var(--s1);border-radius:6px;padding:7px 10px;border:1px solid var(--border)">'+
            '<div class="t2 f10 mb2">'+clabels[k]+'</div>'+
            '<div class="f11" style="line-height:1.55">'+d['s1bmc_'+k].slice(0,200)+(d['s1bmc_'+k].length>200?'...':'')+'</div>'+
          '</div>';
        }
      });
      out+='</div>';
    }
  } else if(evalStage===2){
    ['s2g1','s2g2','s2g3','s2g4'].forEach(function(k,i){
      out+=ansBlock(['Estructura de activos','Costos y propuesta de valor','Estrategia de financiamiento','Margen esperado'][i],d[k]);
    });
    // Show key financials
    if(a.y1&&a.y2){
      out+='<div class="fw7 f12 mb6 mt8">Resumen financiero:</div>';
      out+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';
      var metrics=[
        {l:'Ventas '+co_.y[0],v:'$'+fmt(a.y1.er.v)+'K'},
        {l:'Ventas '+co_.y[1],v:'$'+fmt(a.y2.er.v)+'K'},
        {l:'Util.Neta '+co_.y[1],v:'$'+fmt(a.y2.er.un)+'K'},
        {l:'Total Activo '+co_.y[1],v:'$'+fmt(a.y2.bg.ta)+'K'},
        {l:'Capital '+co_.y[1],v:'$'+fmt(a.y2.bg.cap)+'K'},
        {l:'Total Pasivo '+co_.y[1],v:'$'+fmt(a.y2.bg.tp)+'K'},
      ];
      metrics.forEach(function(m){
        out+='<div style="background:var(--s1);border-radius:6px;padding:6px 8px;text-align:center">'+
          '<div class="t2 f10">'+m.l+'</div><div class="fw7 f12">'+m.v+'</div></div>';
      });
      out+='</div>';
    }
  } else if(evalStage===3){
    out+=ansBlock('Interpretación de liquidez',d.s3i);
    out+=ansBlock('Interpretación ciclos operativos',d.s3opi);
    ['s3g1','s3g2','s3g3'].forEach(function(k,i){
      out+=ansBlock(['Liquidez óptima del sector','Rol del inventario','Ciclo de cobro y pago'][i],d[k]);
    });
    // Key ratios
    if(a.y1&&a.y2){
      out+='<div class="fw7 f12 mb6 mt8">Razones clave:</div>';
      out+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">';
      [
        {l:'Razón Corriente '+co_.y[0],v:a.y1.rat.rc+'x'},{l:'Razón Corriente '+co_.y[1],v:a.y2.rat.rc+'x'},
        {l:'Prueba Ácida '+co_.y[1],v:a.y2.rat.pa+'x'},{l:'Ciclo Efectivo '+co_.y[1],v:a.y2.op.ce+' días'},
      ].forEach(function(m){
        out+='<div style="background:var(--s1);border-radius:6px;padding:6px 8px;text-align:center">'+
          '<div class="t2 f10">'+m.l+'</div><div class="fw7 f12">'+m.v+'</div></div>';
      });
      out+='</div>';
    }
  } else if(evalStage===4){
    out+=ansBlock('Diagnóstico integral H y V + EFE',d.s4i);
    out+=ansBlock('Interpretación del flujo de efectivo',d.s4efe);
    ['s4g1','s4g2','s4g3'].forEach(function(k,i){
      out+=ansBlock(['Factores de crecimiento','Eficiencia operativa','Evolución de activos'][i],d[k]);
    });
    // Key HV data
    if(a.h){
      out+='<div class="fw7 f12 mb6 mt8">Variaciones clave:</div>';
      out+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">';
      [{k:'e_v',l:'Ventas'},{k:'e_ub',l:'Util. Bruta'},{k:'e_un',l:'Util. Neta'},{k:'b_ta',l:'Total Activo'}].forEach(function(it){
        if(a.h[it.k]!==undefined){
          var pos=a.h[it.k]>=0;
          out+='<div style="background:var(--s1);border-radius:6px;padding:6px 8px;text-align:center">'+
            '<div class="t2 f10">'+it.l+' (var.%)</div>'+
            '<div class="fw7 f12" style="color:'+(pos?'var(--green)':'var(--red)')+'">'+
              (pos?'+':'')+a.h[it.k]+'%</div></div>';
        }
      });
      out+='</div>';
    }
  } else if(evalStage===5){
    out+=ansBlock('Interpretación del PE ponderado',d.s5i);
    ['s5g1','s5g2','s5g3'].forEach(function(k,i){
      out+=ansBlock(['Por qué PE ponderado','Análisis del portafolio','Palancas para reducir el PE'][i],d[k]);
    });
    if(a.be){
      out+='<div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:10px;margin-top:8px;text-align:center">'+
        '<div class="t2 f11">PE Ponderado calculado</div>'+
        '<div class="fw7 f20" style="color:var(--green)">'+Math.ceil(a.be.pe,0)+' unidades</div>'+
        '<div class="t2 f11">MCP = $'+fmt(a.be.mc)+' | Numerador = $'+fmt(a.be.num/1000)+'K</div>'+
      '</div>';
    }
  }

  if(!d.s1a&&!d.s1b&&!d.s2g1&&!d.s3i&&!d.s4i&&!d.s5i&&!d.s1bmc_propuesta){
    out+='<p class="t2 f12">Este equipo no registró respuestas escritas en esta etapa.</p>';
  }
  out+='</div></div>';
  return out;}




window.onerror = function(msg,src,line,col,err){
  var app=document.getElementById('app');
  if(app) app.innerHTML='<div style="padding:40px;color:#ef4444;font-family:monospace;background:#0b0e1a;min-height:100vh"><h2>Error JS:</h2><pre>'+msg+'\n\nLine: '+line+'\nCol: '+col+'\n\n'+(err?err.stack:'')+'</pre></div>';
  return false;};
(function init(){
  const ses=DB.getSession();
  if(ses){A.user=ses;if(ses.role!=='teacher'&&ses.role!=='admin')ensureTeamForUser(ses);if(ses.role==='teacher')A.screen='teacher';else{const t=getUserTeam(ses.id);A.screen=t&&t.companyId?'student':'lobby';}}
  render();
})();
</script>
