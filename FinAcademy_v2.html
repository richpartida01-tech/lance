*{box-sizing:border-box;margin:0;padding:0}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--p);border-radius:4px}

.card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:1.25rem}
.card-s{background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem}
.card-ghost{border:1px dashed var(--border);border-radius:14px;padding:1.25rem}
.glow{background:var(--s2);border:1px solid rgba(108,99,255,.35);border-radius:14px;padding:1.25rem;box-shadow:0 0 28px rgba(108,99,255,.07)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.btn:hover{background:rgba(255,255,255,.05);border-color:var(--p)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-p{background:linear-gradient(135deg,var(--p),#8b52ff);border-color:var(--p);color:#fff}
.btn-p:hover{opacity:.9}
.btn-acc{background:rgba(0,212,170,.15);border-color:var(--acc);color:var(--acc)}
.btn-ok{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.btn-danger{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.btn-warn{background:rgba(245,158,11,.15);border-color:var(--yellow);color:var(--yellow)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:6px}
.btn-w{width:100%;justify-content:center}
.inp{width:100%;padding:9px 12px;background:var(--s1);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.55}
select.inp{cursor:pointer}
.blank{width:96px;padding:3px 7px;background:var(--warn-bg);border:1px solid var(--warn-b);border-radius:6px;color:var(--text);font-size:11px;text-align:right;font-family:'IBM Plex Mono',monospace;transition:all .2s}
.blank:focus{outline:none}.blank.ok{background:var(--ok-bg)!important;border-color:var(--ok-b)!important;color:var(--green)}.blank.err{background:var(--err-bg)!important;border-color:var(--err-b)!important;color:var(--red)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bp{background:rgba(108,99,255,.2);color:var(--p2)}.bok{background:rgba(16,185,129,.2);color:var(--green)}.bwarn{background:rgba(245,158,11,.2);color:var(--yellow)}.berr{background:rgba(239,68,68,.2);color:var(--red)}.bblue{background:rgba(59,130,246,.2);color:#93c5fd}.bmuted{background:rgba(71,85,105,.2);color:var(--t2)}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;border:2px solid}
.avsm{width:28px;height:28px;font-size:11px}.avmd{width:36px;height:36px;font-size:13px}.avlg{width:48px;height:48px;font-size:16px}.avxl{width:64px;height:64px;font-size:22px}
.alert{padding:9px 13px;border-radius:9px;font-size:12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.ai{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.aok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.aw{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.ae{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.flex{display:flex;align-items:center}.fbet{display:flex;align-items:center;justify-content:space-between}
.g4{gap:4px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4c{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.t2{color:var(--t2)}.t3{color:var(--t3)}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f15{font-size:15px}.f18{font-size:18px}.f20{font-size:20px}
.fw6{font-weight:600}.fw7{font-weight:700}
.lbl{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sep{border:none;border-top:1px solid var(--border);margin:12px 0}
.ox{overflow-x:auto}
.prog{height:4px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--p),var(--acc));transition:width .5s}
.ft{width:100%;border-collapse:collapse;font-size:12px}
.ft td,.ft th{padding:4px 8px;border-bottom:1px solid rgba(37,40,64,.8)}
.ft th{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding-bottom:6px}
.ft td.r{text-align:right;font-family:'IBM Plex Mono',monospace}
.ft tr.sub td{font-weight:700;border-top:1px solid var(--border);padding-top:6px}
.ft tr.tot td{font-weight:700;background:rgba(108,99,255,.07)}
.ft tr.sec td{font-size:9px;color:var(--p2);font-weight:700;padding-top:10px;text-transform:uppercase;letter-spacing:.08em}
.ft td.ind{padding-left:18px}
.sidebar{width:214px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:100vh}
.sbh{padding:14px 12px 10px;border-bottom:1px solid var(--border)}
.sbb{padding:8px;flex:1;display:flex;flex-direction:column;gap:2px}
.sbf{padding:8px;border-top:1px solid var(--border)}
.ni{padding:7px 10px;border-radius:9px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:9px;color:var(--t2);transition:all .15s;font-weight:500;position:relative}
.ni:hover{background:rgba(108,99,255,.1);color:var(--text)}
.ni.active{background:rgba(108,99,255,.18);color:var(--p2);font-weight:600}
.ni.done{color:var(--green)}
.ni.locked{opacity:.28;cursor:not-allowed;pointer-events:none}
.ninum{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:1px solid currentColor;font-weight:700}
.notif{position:absolute;top:4px;right:6px;width:16px;height:16px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:7px 16px;cursor:pointer;font-size:12px;color:var(--t2);border-bottom:2px solid transparent;font-weight:500;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--p2);border-bottom-color:var(--p)}
.rr{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px}
.rr:nth-child(odd){background:rgba(255,255,255,.02)}.rr.me{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2)}
.coc{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .18s}
.coc:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,99,255,.1)}
.coc.sel{border-color:var(--p);background:rgba(108,99,255,.08)}
.coc.taken{opacity:.3;cursor:not-allowed;pointer-events:none}
.mc{background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.mc.cap{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.05)}
.metric{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-v{font-size:24px;font-weight:700;font-family:'Syne',sans-serif;line-height:1.1}
.metric-l{font-size:11px;color:var(--t2);margin-bottom:6px}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(108,99,255,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,212,170,.08) 0%,transparent 60%)}
.auth-box{width:100%;max-width:440px}
.auth-logo{font-size:44px;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(108,99,255,.4))}
.auth-title{font-size:32px;font-family:'Syne',sans-serif;font-weight:800;background:linear-gradient(135deg,#a09aff,var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stars{display:flex;gap:4px}.star{font-size:20px;cursor:pointer;transition:transform .1s}.star:hover{transform:scale(1.2)}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .3s ease-out}
@keyframes pulse-ring{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(108,99,255,.4)}70%{transform:scale(1);box-shadow:0 0 0 12px rgba(108,99,255,0)}100%{transform:scale(.95);box-shadow:0 0 0 0 rgba(108,99,255,0)}}
.pulse-ring{animation:pulse-ring 2s infinite}
@media print{.no-print{display:none!important}body{background:#fff;color:#000}}

/* === BUSINESS MODEL CANVAS === */
.canvas-wrap{overflow-x:auto;padding:4px 0}
.canvas-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1.3fr 1fr 1fr;
  grid-template-rows:auto auto auto;
  grid-template-areas:
    "sc ac pv rc seg"
    "sc rk pv cn seg"
    "co2 co2 ing ing ing";
  gap:0;
  min-width:720px;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.canvas-area{
  border:1px solid var(--border);
  padding:10px 12px;
  background:var(--s2);
  display:flex;
  flex-direction:column;
  gap:6px;
}
.bmc-block{display:flex;flex-direction:column;gap:6px;height:100%}
.bmc-block-hdr{padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.bmc-hint{background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.18);border-radius:6px;padding:6px 8px}
.bmc-block textarea.inp{font-size:11px;min-height:56px;background:var(--s1);flex:1}

/* GUIDED ANALYSIS */
.guide-section{background:var(--s2);border:1px solid rgba(108,99,255,.3);border-radius:12px;overflow:hidden;margin-bottom:16px}
.guide-hdr{background:rgba(108,99,255,.09);padding:11px 14px;border-bottom:1px solid rgba(108,99,255,.2)}
.guide-q{padding:12px 14px;border-bottom:1px solid var(--border)}
.guide-q:last-child{border-bottom:none}
.guide-tip{font-size:11px;color:var(--yellow);background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);border-radius:6px;padding:5px 9px;margin-bottom:8px;line-height:1.5}
/* OPERATIONAL RATIOS */
.ops-section{background:var(--s2);border:1px solid rgba(0,212,170,.3);border-radius:12px;padding:1rem;margin-bottom:14px}
.cycle-box{border-radius:10px;padding:12px 16px;text-align:center;border:1px solid}
.cycle-val{font-size:22px;font-weight:700;font-family:Syne,sans-serif;margin:6px 0}
/* TEACHER DETAIL */
.team-stage-card{background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}

/* AUTH MODE TOGGLE */
.mode-btn{flex:1;padding:10px 8px;text-align:center;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all .18s;background:transparent}
.mode-btn:hover{border-color:var(--p);color:var(--text)}
.mode-btn.active{background:rgba(108,99,255,.18);border-color:var(--p);color:var(--p2);font-weight:700}
/* MEMBER INPUTS */
.member-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.member-num{width:22px;height:22px;border-radius:50%;background:rgba(108,99,255,.2);color:var(--p2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
/* TEAM INFO CARD */
.team-info-card{background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px}
/* COMPANY SELECT FULL */
.cosel-wrap{min-height:100vh;padding:24px 20px;background:radial-gradient(ellipse at 30% 20%,rgba(108,99,255,.1) 0%,transparent 50%)}

.pe-phase{border-radius:12px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);transition:all .2s}
.pe-phase.open{border-color:var(--phase-color,var(--p))}
.pe-phase-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:default}
.pe-phase.open .pe-phase-hdr{background:rgba(var(--phase-rgb,108 99 255),.1)}
.pe-phase.done .pe-phase-hdr{background:rgba(16,185,129,.07)}
.pe-phase.locked{opacity:.38}
.pe-phase-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.pe-phase-body{padding:14px 16px}
.pe-formula{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:center;line-height:2;margin-bottom:10px}
.pe-formula .num{border-bottom:1px solid var(--t2);display:inline-block;padding-bottom:4px}
.pe-ex-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.pe-data-table{width:100%;font-size:11px;border-collapse:collapse;margin-bottom:8px}
.pe-data-table td{padding:3px 6px}
.pe-data-table td:last-child{text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:600}
.blank-inline{width:72px;padding:2px 6px;background:var(--warn-bg);border:1px solid var(--warn-b);border-radius:5px;color:var(--text);font-size:12px;text-align:right;font-family:'IBM Plex Mono',monospace;transition:all .18s}
.blank-inline:focus{outline:none}
.blank-inline.ok{background:var(--ok-bg)!important;border-color:var(--ok-b)!important;color:var(--green)}
.blank-inline.err{background:var(--err-bg)!important;border-color:var(--err-b)!important;color:var(--red)}
.pe-progress-bar{display:flex;align-items:center;gap:0;margin-bottom:20px;overflow-x:auto}
.pe-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.pe-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.pe-dot.active{background:var(--p);border-color:var(--p);color:#fff}
.pe-dot.locked{background:transparent;color:var(--t3)}
.pe-line{flex:1;height:2px;background:var(--border);min-width:16px}
.pe-line.done{background:var(--green)}
</style>

// ================================================================
// SUPABASE SYNC LAYER
// — Works alongside localStorage. Configure in Panel Docente.
// — All reads come from localStorage (fast/offline).
// — Writes go to both localStorage AND Supabase (when enabled).
// ================================================================
const SYNC={
  sb:null,
  get enabled(){return!!this.sb;},
  init(url,key){
    if(!url||!key||url.includes('YOUR_')||!window.supabase){this.sb=null;return false;}
    try{this.sb=window.supabase.createClient(url,key);return true;}
    catch(e){this.sb=null;return false;}
  },
  // Pull ALL data from Supabase → localStorage → re-render
  async pull(){
    if(!this.sb)return;
    try{
      var [u,t,s,ev]=await Promise.all([
        this.sb.from('fa_users').select('*'),
        this.sb.from('fa_teams').select('*'),
        this.sb.from('fa_subs').select('*'),
        this.sb.from('fa_evals').select('*'),
      ]);
      if(u.data)localStorage.setItem('fa2_users',JSON.stringify(u.data));
      if(t.data){var teams=t.data.map(function(r){var row=Object.assign({},r);if('description' in row){row.desc=row.description;delete row.description;}return row;});localStorage.setItem('fa2_teams',JSON.stringify(teams));}
      if(s.data){
        var subs={};
        s.data.forEach(function(r){
          if(!subs[r.team_id])subs[r.team_id]={};
          subs[r.team_id][r.stage]={data:r.data,score:r.score,submittedBy:r.submitted_by,submittedAt:r.submitted_at};
        });
        localStorage.setItem('fa2_subs',JSON.stringify(subs));
      }
      if(ev.data)localStorage.setItem('fa2_evals',JSON.stringify(ev.data));
      console.log('[SYNC] Datos actualizados desde Supabase');
      render();
    }catch(e){console.warn('[SYNC] Error al sincronizar:',e.message);}
  },
  // Subscribe to real-time changes
  subscribe(){
    if(!this.sb)return;
    var self=this;
    this.sb.channel('fa_realtime')
      .on('postgres_changes',{event:'*',schema:'public'},function(){self.pull();})
      .subscribe();
    console.log('[SYNC] Suscripción en tiempo real activa');
  },
  async pushUser(u){if(!this.sb)return;await this.sb.from('fa_users').upsert(u,{onConflict:'id'});},
  async pushTeam(t){if(!this.sb)return;var row=Object.assign({},t);if('desc' in row){row.description=row.desc;delete row.desc;}await this.sb.from('fa_teams').upsert(row,{onConflict:'id'});},
  async pushSub(teamId,stage,sub){
    if(!this.sb)return;
    await this.sb.from('fa_subs').upsert({
      id:teamId+'_'+stage,team_id:teamId,stage:stage,
      data:sub.data,score:sub.score,submitted_by:sub.submittedBy,submitted_at:sub.submittedAt
    },{onConflict:'id'});
  },
  async pushEval(ev){if(!this.sb)return;await this.sb.from('fa_evals').upsert(ev,{onConflict:'id'});},
  // Save config to localStorage
  saveConfig(url,key){
    localStorage.setItem('fa2_sb_url',url);
    localStorage.setItem('fa2_sb_key',key);
  },
  loadConfig(){
    return{url:localStorage.getItem('fa2_sb_url')||'',key:localStorage.getItem('fa2_sb_key')||''};
  }
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmt(n,d=2){if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d});}
function pct(n){return n==null?'—':n+'%';}
function close(a,b,tol=.015){if(b==null||b===0)return Math.abs(a)<.5;return Math.abs((a-b)/Math.abs(b))<=tol;}
function initials(name){return name?name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase():'?';}
const AVC=['#6c63ff','#d85a30','#d4537e','#378add','#9333ea','#ef4444','#f59e0b','#10b981'];
function avColor(id){const h=(id||'x').split('').reduce((a,c)=>a+c.charCodeAt(0),0);return AVC[h%AVC.length];}
function av(name,id,sz){
  const c=avColor(id||name||'x');
  const cls={sm:'avsm',md:'avmd',lg:'avlg',xl:'avxl'}[sz||'md'];
  return '<span class="av '+cls+'" style="background:'+c+'22;border-color:'+c+'55;color:'+c+'">'+initials(name)+'</span>';}
function getUserTeam(uid){return DB.getTeams().find(t=>t.members&&t.members.includes(uid));}
function getPendingReq(uid){return DB.getTeams().find(t=>t.requests&&t.requests.some(r=>r.userId===uid&&r.status==='pending'));}
function getTeamSub(tid,s){const subs=DB.getSubs();return subs[tid]&&subs[tid][s];}
function teamProg(tid){let d=0;for(let s=1;s<=5;s++)if(getTeamSub(tid,s))d++;return d;}
function stageOk(s,tid){if(s===1)return true;return!!getTeamSub(tid,s-1);}
function teamMembers(tid){const t=DB.getTeams().find(t=>t.id===tid);if(!t)return[];const u=DB.getUsers();return(t.members||[]).map(id=>u.find(x=>x.id===id)).filter(Boolean);}
function pendingReqs(tid){const t=DB.getTeams().find(t=>t.id===tid);if(!t)return[];const u=DB.getUsers();return(t.requests||[]).filter(r=>r.status==='pending').map(r=>({...r,user:u.find(x=>x.id===r.userId)})).filter(r=>r.user);}
function calcTeamScore(tid){const t=DB.getTeams().find(t=>t.id===tid);if(!t||!t.companyId)return 0;let tot=0,earn=0;for(let s=1;s<=5;s++){const sub=getTeamSub(tid,s);if(!sub)continue;tot+=100;earn+=(sub.score||0);}return tot?Math.round(earn/tot*100):0;}
function calcEvalAcc(team){const evs=DB.getEvals().filter(e=>team.members&&team.members.includes(e.evalId));if(!evs.length)return 50;let acc=0;evs.forEach(ev=>{const ts=calcTeamScore(ev.teamId);const es=((ev.scores.rigor+ev.scores.comp+ev.scores.interp+ev.scores.pres)/20)*100;acc+=Math.max(0,100-Math.abs(es-ts));});return Math.round(acc/evs.length);}
function getMyRank(teamId){const allT=DB.getTeams().filter(t=>t.companyId);const rows=allT.map(t=>({id:t.id,score:Math.round((calcTeamScore(t.id)+calcEvalAcc(t))/2)})).sort((a,b)=>b.score-a.score);return(rows.findIndex(r=>r.id===teamId)+1)||'—';}

function rEFE(co){
  var cf=co.ans.cf;if(!cf)return'';
  var y0=co.y[0],y1=co.y[1];
  function bl(id,ans,w){var v=A.inp[id];var cl=v!=null&&v!==''?(close(parseFloat(v),ans,.02)?'ok':'err'):'';return'<input type="number" class="blank'+(cl?' '+cl:'')+'\" id=\"'+id+'\" value=\"'+(v!=null?v:'')+'" placeholder="?" data-a="'+ans+'" step="0.01" style="width:'+(w||90)+'px">';}
  function row(label,val,isBlank,id,indent,bold){
    var cell=isBlank?bl(id,val):('<span class="mono f11 '+(val>0?'style="color:var(--green)"':val<0?'style="color:var(--red)"':'')+'">'+fmt(val)+'</span>');
    return'<tr'+(bold?' style="border-top:1px solid var(--border);font-weight:700"':'')+'><td class="f12'+(indent?' ind':'')+(bold?' fw7':'')+'">'+label+'</td><td class="r">'+cell+'</td></tr>';}
  return'<div class="card mb12">'+
    '<div class="flex g8 mb10"><span style="font-size:20px">&#x1F4B8;</span>'+
    '<div><div class="fw7 f14">Estado de Flujo de Efectivo — Método Indirecto ('+y0+' → '+y1+')</div>'+
    '<div class="t2 f11">Muestra de DÓNDE vino el efectivo y HACIA DÓNDE fue. Valida que el EFE cuadre con el Balance General.</div></div></div>'+
    '<div class="alert ai mb10">'+
      '<div>'+
      '<div class="fw6 f12 mb4">&#x1F4D6; Cómo leer el Método Indirecto:</div>'+
      '<div class="f11 t2" style="line-height:1.7">'+
        '1. Partimos de la <strong>Utilidad Neta</strong> (ya incluye todo el P&L)<br>'+
        '2. <strong>Sumamos Depreciación</strong> (es gasto pero NO salió efectivo)<br>'+
        '3. Si <strong>CxC sube</strong> → vendimos a crédito → efectivo BAJA (ajuste negativo)<br>'+
        '4. Si <strong>Inventario sube</strong> → compramos más stock → efectivo BAJA<br>'+
        '5. Si <strong>CxP sube</strong> → compramos a crédito → efectivo SUBE (ajuste positivo)<br>'+
        '6. Suma = <strong>Flujo Operativo</strong> (el más importante: ¿el negocio genera caja?)<br>'+
        '7. <strong>Inversiones</strong>: compra de equipo = salida de caja<br>'+
        '8. <strong>Financiamiento</strong>: pedir/pagar deuda = entrada/salida<br>'+
        '9. Suma todo = <strong>Variación Neta</strong>. Efectivo inicial + Variación = Efectivo Final &#x2192; ¡debe coincidir con el Balance!'+
      '</div></div>'+
    '</div>'+

function doPEProgress(nextPhase){
  var prev=nextPhase-1;var errs={};
  var checks={
    1:[{id:'ej_cm',ans:27},{id:'ej_pe1',ans:371}],
    2:[{id:'ej_num2',ans:12000},{id:'ej_pe2',ans:445}],
    3:[{id:'ej_num3',ans:8400},{id:'ej_pe3',ans:312}],
    4:[{id:'ej_num4',ans:14400},{id:'ej_pe4',ans:534}],
    5:[{id:'ej5_mc0',ans:27},{id:'ej5_mc1',ans:15},{id:'ej5_mc2',ans:30},
       {id:'ej5_mcp0',ans:16.2},{id:'ej5_mcp1',ans:4.5},{id:'ej5_mcp2',ans:3.0},
       {id:'ej5_mcpt',ans:23.7},{id:'ej5_pe',ans:608}],
  };
  var thisChecks=checks[prev]||[];
  var wrong=0;
  thisChecks.forEach(function(c){
    var v=parseFloat(A.inp[c.id]||'');
    if(isNaN(v)||!close(v,c.ans,.04)){errs[c.id]=true;wrong++;}
  });
  if(wrong>0){
    errs['_p'+prev]=true;
    ss({peErr:errs});
    msg('Hay '+(wrong===1?'1 valor incorrecto':wrong+' valores incorrectos')+'. Revísalos o usa el botón de ayuda.','warn');
  } else {
    ss({pePhase:nextPhase,peErr:{}});
  }}

function calcParticipation(teamId){
  var team=DB.getTeams().find(function(t){return t.id===teamId;});
  if(!team)return 0;
  var evaluable=DB.getTeams().filter(function(t){return t.companyId&&t.id!==teamId&&teamProg(t.id)>0;});
  if(!evaluable.length)return 100;
  var evs=DB.getEvals().filter(function(e){return team.members&&team.members.includes(e.evalId);});
  var unique=new Set(evs.map(function(e){return e.teamId;})).size;
  return Math.round(unique/evaluable.length*100);}

function calcEvalQuality(team){
  var evs=DB.getEvals().filter(function(e){return team.members&&team.members.includes(e.evalId);});
  if(!evs.length)return 0;
  var acc=0,cnt=0;
  evs.forEach(function(ev){
    var target=DB.getTeams().find(function(t){return t.id===ev.teamId;});
    if(!target)return;
    var ts=calcTeamScore(ev.teamId);
    // average star rating from fieldEvals
    var fv=ev.fieldEvals?Object.values(ev.fieldEvals):[];
    if(!fv.length&&ev.scores){var sc=ev.scores;fv=[sc.rigor,sc.comp,sc.interp,sc.pres].filter(Boolean);}
    if(!fv.length)return;
    var avg=fv.reduce(function(s,v){return s+(parseInt(v)||0);},0)/fv.length;
    var evalPct=avg/5*100;
    acc+=Math.max(0,100-Math.abs(evalPct-ts));cnt++;
  });
  return cnt?Math.round(acc/cnt):0;}

function calcScore(stage,tid,data){
  const t=DB.getTeams().find(t=>t.id===tid);if(!t||!t.companyId)return 0;
  const a=getC(t.companyId).ans;let tot=0,ok=0;
  function chk(v,ans){tot++;if(close(parseFloat(v),ans))ok++;}
  if(stage===1)return 100;
  if(stage===2){['y1','y2'].forEach(yr=>{const bg=a[yr].bg,er=a[yr].er;chk(data['s2ac'+yr],bg.ac);chk(data['s2anc'+yr],bg.anc);chk(data['s2ta'+yr],bg.ta);chk(data['s2pc'+yr],bg.pc);chk(data['s2tp'+yr],bg.tp);chk(data['s2ur'+yr],bg.ur);chk(data['s2cap'+yr],bg.cap);chk(data['s2tpc'+yr],bg.ta);chk(data['s2ub'+yr],er.ub);chk(data['s2tgo'+yr],er.tgo);chk(data['s2uo'+yr],er.uo);chk(data['s2uai'+yr],er.uai);chk(data['s2isr'+yr],er.isr);chk(data['s2un'+yr],er.un);});}
  else if(stage===3){['y1','y2'].forEach(yr=>{const r=a[yr].rat;['ctn','rc','pa','re','rte'].forEach(k=>chk(data['s3'+k+yr],r[k]));});}
  else if(stage===4){['b_ef','b_ac','b_ta','b_pc','b_tp','b_cap','e_v','e_cv','e_ub','e_uo','e_un'].forEach(k=>{chk(data['s4h_'+k],a.h[k]);chk(data['s4v1_'+k],a.v.y1[k]);chk(data['s4v2_'+k],a.v.y2[k]);});}
  else if(stage===5){const be=a.be;chk(data.s5num,be.num/1000);be.pr.forEach((p,i)=>{chk(data['s5mc'+i],p.pv-p.cv);chk(data['s5mcp'+i],Math.round((p.pv-p.cv)*p.p*100)/100);});chk(data.s5mcpt,be.mc);chk(data.s5pe,be.pe);}
  return tot?Math.round(ok/tot*100):0;}

function doLogin(){
  var mode=A.loginMode||'individual';
  var email=(A.inp.lEmail||document.getElementById('lEmail')?.value||'').trim().toLowerCase();
  var pass=A.inp.lPass||document.getElementById('lPass')?.value||'';
  if(!email||!email.includes('@')){msg('Ingresa tu correo EBC v&aacute;lido.','warn');return;}
  if(!pass||pass.length<4){msg('La contrase&ntilde;a debe tener m&iacute;nimo 4 caracteres.','warn');return;}
  // TEACHER
  if(email==='profe@ebc.mx'||email==='profesor@ebc.mx'){
    if(pass!=='2024'){msg('Contrase&ntilde;a incorrecta.','err');return;}
    var tu={id:'teacher',name:'Docente EBC',email:email,role:'teacher'};
    DB.saveSession(tu);ss({user:tu,screen:'teacher'});return;}
  // DEMO ADMIN
  if(email==='demo@ebc.mx'){
    if(pass!=='demo2024'){msg('Contrase&ntilde;a incorrecta.','err');return;}
    var du={id:'demo',name:'Demo Admin',email:email,role:'admin'};
    DB.saveSession(du);ss({user:du,screen:'demo'});return;}
  // TEAM MODE
  if(mode==='team'){
    var teamName=(document.getElementById('tName')?.value||'').trim();
    var mc=Math.max(2,Math.min(6,parseInt(A.inp.memberCount||'2')));
    var mnames=[];
    for(var i=0;i<mc;i++){var mn=(document.getElementById('m'+i)?.value||'').trim();if(mn)mnames.push(mn);}
    var users=DB.getUsers();
    var u=users.find(function(x){return x.email===email;});
    if(!u){
      if(!teamName){msg('Escribe el nombre del equipo.','warn');return;}
      if(mnames.length<1){msg('Agrega al menos 1 integrante.','warn');return;}
      u={id:uid(),name:teamName,teamName:teamName,email:email,password:pass,
         role:'team',memberNames:mnames,createdAt:Date.now()};
      users.push(u);DB.saveUsers(users);
    } else {
      if(u.password&&u.password!==pass){msg('Contrase&ntilde;a incorrecta.','err');return;}
      if(!u.password){u.password=pass;}
      if(mnames.length>0){u.memberNames=mnames;u.teamName=teamName||u.teamName;}
      DB.saveUsers(users);
    }
    ensureTeamForUser(u);
    DB.saveSession(u);var t=getUserTeam(u.id);
    ss({user:u,screen:t&&t.companyId?'student':'lobby',inp:{}});return;}
  // INDIVIDUAL MODE
  var users=DB.getUsers();
  var u=users.find(function(x){return x.email===email;});
  if(!u){
    var rawN=email.split('@')[0].replace(/[._-]/g,' ');
    var dispN=rawN.replace(/\b\w/g,function(c){return c.toUpperCase();});
    u={id:uid(),name:dispN,email:email,password:pass,role:'student',
       memberNames:[dispN],createdAt:Date.now()};
    users.push(u);DB.saveUsers(users);
  } else {
    if(u.password&&u.password!==pass){msg('Contrase&ntilde;a incorrecta.','err');return;}
    if(!u.password){u.password=pass;DB.saveUsers(users);}
  }
  ensureTeamForUser(u);
  DB.saveSession(u);var t=getUserTeam(u.id);
  ss({user:u,screen:t&&t.companyId?'student':'lobby',inp:{}});}

function doRegister(){doLogin();}

function doLogout(){DB.clearSession();ss({user:null,screen:'login',inp:{},view:'home',stage:1,tsv:'members'});}

function doCreateTeam(){
  const name=(A.inp.ct_name||document.getElementById('ct_name')?.value||'').trim();
  const desc=(A.inp.ct_desc||document.getElementById('ct_desc')?.value||'').trim();
  const max=parseInt(A.inp.ct_max||document.getElementById('ct_max')?.value||'4');
  if(!name){msg('El nombre del equipo es obligatorio.','warn');return;}
  const teams=DB.getTeams();
  if(teams.find(t=>t.name.toLowerCase()===name.toLowerCase())){msg('Ya existe un equipo con ese nombre.','err');return;}
  if(getUserTeam(A.user.id)){msg('Ya perteneces a un equipo.','warn');return;}
  const t={id:uid(),name,desc,leaderId:A.user.id,members:[A.user.id],requests:[],companyId:null,maxMembers:max,status:'open',createdAt:Date.now()};
  teams.push(t);DB.saveTeams(teams);ss({screen:'lobby',inp:{},tsv:'members'});}

function doJoinRequest(teamId){
  const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);
  if(!t){msg('Equipo no encontrado.','err');return;}
  if(t.members.length>=t.maxMembers){msg('El equipo está lleno.','err');return;}
  if(getUserTeam(A.user.id)){msg('Ya perteneces a un equipo.','warn');return;}
  const alreadyPending=teams.some(t=>t.requests&&t.requests.some(r=>r.userId===A.user.id&&r.status==='pending'));
  if(alreadyPending){msg('Ya tienes una solicitud pendiente.','warn');return;}
  if(!t.requests)t.requests=[];
  t.requests.push({userId:A.user.id,requestedAt:Date.now(),status:'pending'});
  DB.saveTeams(teams);ss({screen:'lobby'});}

function doCancelReq(teamId){const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;t.requests=(t.requests||[]).filter(r=>r.userId!==A.user.id);DB.saveTeams(teams);ss({screen:'lobby'});}

function doApproveReq(teamId,userId){
  const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;
  if(t.members.length>=t.maxMembers){msg('El equipo está lleno.','err');return;}
  const req=t.requests.find(r=>r.userId===userId);if(req)req.status='accepted';
  if(!t.members.includes(userId))t.members.push(userId);
  if(t.members.length>=t.maxMembers)t.status='full';
  DB.saveTeams(teams);ss({tsv:'requests'});msg('✓ Miembro aprobado.','ok');}

function doRejectReq(teamId,userId){const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;const req=t.requests.find(r=>r.userId===userId);if(req)req.status='rejected';DB.saveTeams(teams);ss({tsv:'requests'});msg('Solicitud rechazada.','warn');}

function doKick(teamId,userId){
  if(!confirm('¿Expulsar a este miembro?'))return;
  const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;
  t.members=t.members.filter(id=>id!==userId);t.status='open';DB.saveTeams(teams);ss({tsv:'members'});}

function doLeaveTeam(teamId){
  if(!confirm('¿Salir del equipo?'))return;
  const teams=DB.getTeams();const t=teams.find(t=>t.id===teamId);if(!t)return;
  if(t.leaderId===A.user.id){teams.splice(teams.findIndex(x=>x.id===teamId),1);msg('Equipo disuelto.','warn');}
  else{t.members=t.members.filter(id=>id!==A.user.id);t.status='open';}
  DB.saveTeams(teams);ss({screen:'lobby'});}

function doSelectCo(teamId,coId){
  const teams=DB.getTeams();const taken=teams.some(t=>t.companyId===coId&&t.id!==teamId);
  if(taken){msg('Esa empresa ya fue elegida por otro equipo.','err');return;}
  const t=teams.find(t=>t.id===teamId);if(!t)return;
  t.companyId=coId;t.status='active';DB.saveTeams(teams);ss({screen:'student',view:'home',stage:1});}

function doSubmit(stage){
  document.querySelectorAll('textarea,input[type=text],input[type=email]').forEach(el=>{if(el.id)A.inp[el.id]=el.value;});
  const team=getUserTeam(A.user.id);const co=getC(team?.companyId);
  if(!team||!co){msg('Error: sin equipo o empresa.','err');return;}
  if(stage>=2&&(!A.user||A.user.role!=='admin')){var gqs=getGuide(stage,co);var gAnswered=gqs.filter(function(q){return(A.inp[q.id]||'').trim().length>=30;});if(gAnswered.length<2){msg('Responde al menos 2 preguntas del Análisis Guiado (30+ caracteres c/u) antes de entregar.','warn');return;}}
if(stage===1){const subs=DB.getSubs();if(!subs[team.id])subs[team.id]={};subs[team.id][1]={data:{...A.inp},score:100,submittedBy:A.user.id,submittedAt:Date.now()};DB.saveSubs(subs);ss({view:'stages',stage:2});msg('✅ Etapa 1 entregada.','ok');return;}
  const score=calcScore(stage,team.id,A.inp);
  if(score<25){msg('Score de '+score+'%. Revisa tus cálculos (mínimo 25%).','warn');return;}
  const subs=DB.getSubs();if(!subs[team.id])subs[team.id]={};
  subs[team.id][stage]={data:{...A.inp},score,submittedBy:A.user.id,submittedAt:Date.now()};DB.saveSubs(subs);
  SYNC.pushSub(team.id,stage,subs[team.id][stage]);
  if(stage<5)ss({view:'stages',stage:stage+1});else ss({view:'home'});
  msg('✅ Etapa '+stage+' entregada. Score: '+score+'%','ok');}


function doEval(){
  var tid=A.evalTarget;if(!tid){msg('Selecciona un equipo.','warn');return;}
  var comment=document.getElementById('ev_comment')?.value||'';
  if(!comment.trim()){msg('Agrega un comentario general.','warn');return;}
  // Collect field evaluations
  var fieldEvals={};
  var fcount=0;
  Object.keys(A.inp).forEach(function(k){
    if(k.startsWith('fev_')&&parseInt(A.inp[k])>0){fieldEvals[k]=parseInt(A.inp[k]);fcount++;}
  });
  if(fcount<2){msg('Califica al menos 2 respuestas con estrellas antes de enviar.','warn');return;}
  var evs=DB.getEvals();
  var idx=evs.findIndex(function(e){return e.evalId===A.user.id&&e.teamId===tid;});
  var ev={id:uid(),evalId:A.user.id,evalName:A.user.name,teamId:tid,
          fieldEvals:fieldEvals,scores:{},comment:comment,createdAt:Date.now()};
  if(idx>=0)evs[idx]=ev;else evs.push(ev);
  DB.saveEvals(evs);
  SYNC.pushEval(ev);
  // Clear this eval's inputs
  Object.keys(A.inp).forEach(function(k){if(k.startsWith('fev_'))delete A.inp[k];});
  msg('✅ Evaluación enviada.','ok');ss({});}



async function doSBConnect(){
  var url=(document.getElementById('sb_url')?.value||'').trim();
  var key=(document.getElementById('sb_key')?.value||'').trim();
  if(!url||!key){msg('Ingresa la URL y la clave de Supabase.','warn');return;}
  SYNC.saveConfig(url,key);
  var ok=SYNC.init(url,key);
  if(ok){
    msg('Conectando...','info',60000);
    await SYNC.pull();
    SYNC.subscribe();
    msg('✅ Conectado a Supabase. Datos sincronizados.','ok');
    ss({});
  } else {
    msg('Error al conectar. Verifica la URL y la clave.','err');
  }
}

async function doSBExportAll(){
  if(!SYNC.enabled){msg('Primero configura y conecta Supabase.','warn');return;}
  msg('Exportando datos...','info',30000);
  try{
    var users=DB.getUsers();
    var teams=DB.getTeams();
    var subs=DB.getSubs();
    var evals=DB.getEvals();
    // Push all users
    for(var u of users){await SYNC.pushUser(u);}
    // Push all teams
    for(var t of teams){await SYNC.pushTeam(t);}
    // Push all submissions
    for(var tid in subs){for(var stage in subs[tid]){await SYNC.pushSub(tid,parseInt(stage),subs[tid][stage]);}}
    // Push all evals
    for(var ev of evals){await SYNC.pushEval(ev);}
    msg('✅ Todos los datos exportados a Supabase ('+users.length+' usuarios, '+teams.length+' equipos).','ok');
  }catch(e){msg('Error al exportar: '+e.message,'err');}
}

function doExport(){const d={users:DB.getUsers(),teams:DB.getTeams(),subs:DB.getSubs(),evals:DB.getEvals(),at:new Date().toISOString()};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));a.download='finacademy_'+new Date().toLocaleDateString('es-MX').replace(/\//g,'-')+'.json';a.click();}
function doImport(f){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.users)DB.saveUsers(d.users);if(d.teams)DB.saveTeams(d.teams);if(d.subs)DB.saveSubs(d.subs);if(d.evals)DB.saveEvals(d.evals);msg('✅ Datos importados.','ok');ss({});}catch{msg('Error al importar el archivo.','err');}};r.readAsText(f);}

// ================================================================
// INIT
// ================================================================
(function init(){
  // Load Supabase config from localStorage
  var cfg=SYNC.loadConfig();if(cfg.url&&cfg.key){SYNC.init(cfg.url,cfg.key);if(SYNC.enabled){SYNC.subscribe();SYNC.pull().then(function(){render();});}}
  const ses=DB.getSession();
  if(ses){A.user=ses;if(ses.role!=='teacher'&&ses.role!=='admin')ensureTeamForUser(ses);if(ses.role==='teacher')A.screen='teacher';else{const t=getUserTeam(ses.id);A.screen=t&&t.companyId?'student':'lobby';}}
  render();
})();
</script>
